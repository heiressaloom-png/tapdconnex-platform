<style>

ve 3.15s ease-in-out infinite;z-index:1}.capture-btn .star{font-size:40px}.capture-btn:before,.capture-btn:after{content:'';position:absolute;border-radius:50%;border:1px solid rgba(216,166,55,.52);inset:-18px;animation:ring 3.15s ease-out infinite}.capture-btn:after{inset:-42px;animation-delay:.72s}.capture-btn:hover{transform:translateY(-2px)}.capture-hint{margin-top:30px;color:var(--text-secondary);font-size:16px;text-align:center}.trust-row{display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap;margin-top:34px;color:var(--text-secondary);font-size:14px}.trust-item{display:flex;align-items:center;gap:10px}.trust-ico{width:38px;height:38px;border-radius:50%;background:var(--accent-bg);color:var(--accent);display:grid;place-items:center;font-weight:900}.side-title{display:flex;align-items:center;gap:14px;margin-bottom:22px}.side-icon{width:54px;height:54px;border-radius:50%;background:var(--surface-warm);display:grid;place-items:center;font-size:24px}.side-title h2{font-size:16px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.side-copy{color:var(--text-secondary);line-height:1.6;margin-bottom:24px}.detail{display:grid;grid-template-columns:28px 1fr;gap:10px;margin:18px 0}.detail .k{font-weight:800}.detail .v{color:var(--text-primary);margin-top:2px}.side-actions{display:grid;gap:12px;margin-top:24px}.side-note{font-size:12px;color:var(--text-secondary);text-align:center}.bottom-note{max-width:1220px;margin:0 auto 24px;padding:0 24px}.note-card{border:1px solid var(--border-soft);background:rgba(255,255,255,.48);border-radius:14px;padding:16px 20px;color:var(--text-secondary);display:flex;justify-content:space-between;gap:14px}.rec-view,.review-view,.saved-view{padding:48px 28px;text-align:center}.rec-badge{display:inline-flex;align-items:center;gap:9px;color:var(--recording);background:var(--recording-bg);border-radius:999px;padding:9px 16px;font-family:var(--font-mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:800}.live-dot{width:10px;height:10px;border-radius:50%;background:var(--recording);animation:blink 1.1s ease-in-out infinite}.timer{font-family:var(--font-mono);font-size:56px;margin:22px 0}.record-orb{width:180px;height:180px;border-radius:50%;margin:0 auto 22px;background:radial-gradient(circle,#fff,var(--recording-bg));border:2px solid var(--recording);display:grid;place-items:center;font-size:48px;position:relative}.record-orb:before,.record-orb:after{content:'';position:absolute;inset:0;border:2px solid var(--recording);border-radius:50%;animation:recwave 2s ease-out infinite}.record-orb:after{animation-delay:1s}.action-bar{position:fixed;left:0;right:0;bottom:0;background:rgba(246,242,234,.9);border-top:1px solid var(--border-soft);padding:14px 24px;z-index:60;backdrop-filter:blur(14px);display:none}.action-inner{max-width:760px;margin:0 auto;display:flex;gap:12px}.btn{border:0;border-radius:14px;padding:14px 20px;min-height:52px;font-family:var(--font-body);font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}.btn-primary{background:var(--accent);color:#fff;flex:1}.btn-secondary{background:var(--surface);border:1px solid var(--border-medium);color:var(--text-primary)}.btn-danger{background:var(--recording);color:#fff;flex:1}.form{display:grid;gap:16px;max-width:760px;margin:0 auto;text-align:left}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field label{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}.input,.textarea,select.input{width:100%;border:1px solid var(--border-medium);border-radius:12px;background:#fff;padding:13px 14px;font:inherit;color:var(--text-primary)}.textarea{min-height:92px;resize:vertical}.notice{background:var(--warm-bg);border:1px solid #EFD9B6;border-radius:14px;padding:14px 16px;text-align:left;color:var(--text-secondary)}.sheet-wrap{position:fixed;inset:0;background:rgba(24,20,16,.42);z-index:90;display:none;align-items:flex-end;justify-content:center}.sheet-wrap.show{display:flex}.sheet{width:100%;max-width:720px;max-height:86vh;overflow:auto;background:var(--bg);border-radius:24px 24px 0 0;padding:24px;box-shadow:var(--shadow-lg)}.grip{width:42px;height:5px;border-radius:99px;background:var(--border-medium);margin:0 auto 22px}.sheet h2{font-family:var(--font-display);font-size:28px;margin-bottom:6px}.sheet-sub{color:var(--text-secondary);margin-bottom:20px}.tpl-option{width:100%;border:1px solid var(--border-soft);background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;text-align:left;display:flex;justify-content:space-between;gap:12px;cursor:pointer}.tpl-option:hover{border-color:var(--accent)}.tpl-option.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}.tpl-option.locked{opacity:.58;cursor:not-allowed}.tpl-name{font-family:var(--font-display);font-size:20px;font-weight:700}.tpl-sum{color:var(--text-secondary);font-size:13px;margin-top:4px}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);background:var(--text-primary);color:var(--bg);border-radius:999px;padding:12px 20px;font-weight:800;opacity:0;transition:.25s;z-index:120}.toast.show{opacity:1;transform:translateX(-50%)}@keyframes alive{50%{transform:scale(1.035);box-shadow:inset 0 5px 18px rgba(255,255,255,.6),inset 0 -12px 22px rgba(96,62,11,.20),0 24px 92px rgba(216,166,55,.52)}}@keyframes ring{0%{transform:scale(.94);opacity:.65}78%{transform:scale(1.17);opacity:0}100%{opacity:0}}@keyframes soundMove{50%{transform:scaleX(1.08);opacity:.5}}@keyframes blink{50%{opacity:.25}}@keyframes recwave{100%{transform:scale(1.45);opacity:0}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}@media(max-width:980px){.wrap{grid-template-columns:1fr}.side-card{position:static;order:-1}.tabs{overflow:auto;max-width:100%;justify-content:flex-start}.top-inner{flex-wrap:wrap}.exit{display:none}.capture-btn{width:220px;height:220px;font-size:28px}}@media(max-width:560px){.top{padding:12px}.top-inner{display:block}.brand{margin-bottom:12px}.tabs{width:100%;border-radius:14px}.tab{padding:11px 13px;font-size:13px}.wrap{padding:14px;gap:16px}.capture-head{display:block;padding:20px}.capture-head .button-ghost{margin-top:14px;width:100%}.event-strip{display:block;padding:14px 20px}.event-meta{margin-bottom:10px}.capture-stage{min-height:420px;padding:38px 14px}.capture-btn{width:190px;height:190px;font-size:24px}.trust-row{gap:16px}.row{grid-template-columns:1fr}.note-card{display:block}.action-inner{display:grid}.btn-secondary{width:100%}}

<div class="app">
<header class="top"><div class="top-inner"><a class="brand" href="capture.html"><div class="brand-mark">T</div><div class="brand-name">TAPDconnex</div></a><nav class="tabs" aria-label="Main tabs"><a class="tab active" href="capture.html">● Capture</a><button class="tab" id="topTemplates">▤ Templates</button><a class="tab" href="relationship-hub.html">♢ Relationship Hub</a><a class="tab" href="onboarding.html?step=8">○ Profile &amp; Voice</a></nav><a class="exit" href="index.html">Exit →</a></div></header>

<div class="toast" id="toast"></div>
<script>
const STORAGE={PLAN:'tapd_user_plan',ONBOARDING:'tapd_onboarding_data',CAPTURES:'tapd_captures',EVENT:'tapd_event_context',TEMPLATES_CUSTOM:'tapd_templates_custom',SELECTED_TEMPLATE:'tapd_selected_template',USER_ID:'tapd_user_id'};
const TEMPLATES=[
{id:'opportunity',name:'Opportunity',tier:'starter',summary:'Find out if there is a real deal here and lock in the next step.',outcomeCategory:'Revenue',questions:['What are you focused on at the moment?','What is working well and what is proving challenging?','What would success look like for you?','What is the best next step from here?'],signals:['Frustration','Urgency','Budget','Growth goals','Active projects','Buying intent'],whatToOffer:['Demo','Case study','Pilot','Introduction','Discovery call']},
{id:'connector',name:'Connector',tier:'starter_locked',summary:'Discover who they can introduce me to and how to make it happen.',outcomeCategory:'Access',questions:['Who should I know in your world?'],signals:['Referrals','Access to decision makers'],whatToOffer:['Intro paragraph','One-pager']},
{id:'stay_in_touch',name:'Stay in Touch',tier:'starter_locked',summary:'Keep the door open without forcing anything.',outcomeCategory:'Partnerships',questions:['When should we reconnect?'],signals:['Shared interests','Long-term potential'],whatToOffer:['Useful article','Event invite']},
{id:'strategic_partnership',name:'Strategic Partnership',tier:'pro',summary:'Explore where our work could overlap and find one thing to do together.',outcomeCategory:'Partnerships',questions:['Where do you see opportunities for collaboration?'],signals:['Shared audience','Mutual benefit'],whatToOffer:['Partnership brief','Joint event']},
{id:'speaking',name:'Speaking Opportunity',tier:'pro',summary:'Find the stage that fits and the angle that earns it.',outcomeCategory:'Visibility',questions:['What topics resonate most with your audience?'],signals:['Upcoming events','Speaker shortages'],whatToOffer:['Topic outline','Speaker reel']},
{id:'career',name:'Career Opportunity',tier:'pro',summary:'Surface the role, timing, and path in.',outcomeCategory:'Career',questions:['Where are you looking for support?'],signals:['Hiring','Team growth'],whatToOffer:['CV or portfolio','Case study']},
{id:'product_discovery',name:'Product Discovery',tier:'pro',summary:'Hear how they actually solve this today and what is broken about it.',outcomeCategory:'Learning',questions:['How are you currently solving that?'],signals:['Pain','Frequency','Workarounds'],whatToOffer:['Beta access','Concept walkthrough']},
{id:'pilot_beta',name:'Pilot / Beta Opportunity',tier:'pro',summary:'Test interest in trying something new and lock in what would make it worth it.',outcomeCategory:'Revenue',questions:['Would you be open to testing something new?'],signals:['Curiosity','Early adopter behaviour'],whatToOffer:['Pilot invite','Custom demo']},
{id:'advisory',name:'Advisory / Mentor',tier:'pro',summary:'Learn from someone further down the road and earn the right to come back.',outcomeCategory:'Learning',questions:['What trends are you seeing?'],signals:['Experience','Thought leadership'],whatToOffer:['Coffee chat','Project update']},
{id:'community_access',name:'Community Access',tier:'pro',summary:'Find the doorway in and the right way to walk through it.',outcomeCategory:'Access',questions:['What communities are you involved in?'],signals:['Gatekeepers','Ecosystems'],whatToOffer:['Bio summary','Joining note']}
];
const readJSON=(k,f)=>{try{return JSON.parse(localStorage.getItem(k))||f}catch(e){return f}};const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');const slug=s=>String(s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');const uid=()=> 'cap_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2200)}
function getPlan(){const ob=readJSON(STORAGE.ONBOARDING,null);return localStorage.getItem(STORAGE.PLAN)||(ob&&ob.data&&ob.data.plan)||'starter'}function canUse(base,plan){return plan==='pro'||base.id==='opportunity'}function effectiveTemplate(base){const ov=(readJSON(STORAGE.TEMPLATES_CUSTOM,{})||{})[base.id]||{};return {...base,...ov,questions:Array.isArray(ov.questions)?ov.questions:base.questions,signals:Array.isArray(ov.signals)?ov.signals:base.signals,whatToOffer:Array.isArray(ov.whatToOffer)?ov.whatToOffer:base.whatToOffer}}
function blankPerson(){return{name:'',company:'',role:'',summary:'',nextStep:'',signal:'',momentum:''}}
const app={screen:'ready',plan:getPlan(),templateId:localStorage.getItem(STORAGE.SELECTED_TEMPLATE)||'opportunity',event:readJSON(STORAGE.EVENT,null),mediaRecorder:null,stream:null,chunks:[],audioBlob:null,audioUrl:null,durationMs:0,timerStart:0,timerInt:null,person:blankPerson(),lastSavedName:''};if(!canUse(TEMPLATES.find(t=>t.id===app.templateId)||TEMPLATES[0],app.plan))app.templateId='opportunity';
function currentTemplate(){return effectiveTemplate(TEMPLATES.find(t=>t.id===app.templateId)||TEMPLATES[0])}
function render(){const v=document.getElementById('view');document.getElementById('actionBar').style.display='none';if(app.screen==='ready'){v.innerHTML=renderReady();bindReady()}else if(app.screen==='recording'){v.innerHTML=renderRecording();bindRecording()}else if(app.screen==='review'){v.innerHTML=renderReview();bindReview()}else{v.innerHTML=renderSaved();bindSaved()}window.scrollTo(0,0)}
function eventSummary(ev){if(!ev||!ev.name)return '<em>No event set — add one to group everyone you meet here.</em>';return `<strong>Event context:</strong> ${[ev.name,ev.location,ev.session,ev.date].filter(Boolean).map(esc).join(' &nbsp; • &nbsp; ')}`}
function renderEventDetails(ev){if(!ev||!ev.name)return `<p class="side-copy">Set this once. Everyone you capture here is grouped together — and you won’t re-enter it for the next conversation.</p><button class="button-ghost" id="sideAddEvent" style="width:100%">Add event context</button>`;const rows=[['📅','Event name',ev.name],['📍','Location',ev.location],['⇄','Session',ev.session],['🗓','Date / Time',ev.date],['✥','Environment',ev.type]].filter(r=>r[2]);return `<p class="side-copy">Set this once. Everyone you capture here is grouped together — and you won’t re-enter it for the next conversation.</p>${rows.map(r=>`<div class="detail"><div>${r[0]}</div><div><div class="k">${esc(r[1])}</div><div class="v">${esc(r[2])}</div></div></div>`).join('')}<div class="side-actions"><button class="button-ghost" id="cloneEvent" style="width:100%">⧉ Clone event context</button><div class="side-note">Create a new event and change the area only.</div><button class="button-ghost" id="sideEditEvent" style="width:100%">✎ Edit event context</button></div>`}
function renderReady(){const t=currentTemplate(),ev=app.event;return `<div class="wrap"><section class="main-card"><div class="capture-head"><div><div class="label">Using template</div><div class="template-name">${esc(t.name)} <span class="badge ${t.tier==='pro'?'pro':''}">${t.tier==='pro'?'Pro':'Starter'}</span></div></div><button class="button-ghost" id="changeTpl">⇄ Change template</button></div><div class="event-strip"><div class="event-meta">${eventSummary(ev)}</div><button class="button-ghost" id="editEvent">${ev&&ev.name?'Edit event':'Add event'}</button></div><div class="capture-stage"><div class="soundwave"></div><button class="capture-btn" id="captureBtn"><span class="star">✦</span><span>Capture<br>This Moment</span></button><div class="capture-hint">Tap to start recording. You can stop any time.</div><div class="trust-row"><div class="trust-item"><span class="trust-ico">◉</span><span><strong>High quality</strong><br>Audio ready</span></div><div class="trust-item"><span class="trust-ico">◎</span><span><strong>AI listening</strong><br>${esc(t.name)} template</span></div><div class="trust-item"><span class="trust-ico">◇</span><span><strong>Private & secure</strong><br>Only you can see this</span></div></div></div></section><aside class="side-card"><div class="side-title"><div class="side-icon">🗓</div><h2>Event Context</h2></div>${renderEventDetails(ev)}</aside></div><div class="bottom-note"><div class="note-card"><span>ⓘ All recordings are saved to the current event above.</span><button class="linkish button-ghost" id="helpBtn">Need help?</button></div></div>`}
function bindReady(){document.getElementById('captureBtn').onclick=startRecording;document.getElementById('changeTpl').onclick=openTemplatePicker;document.getElementById('topTemplates').onclick=openTemplatePicker;document.getElementById('editEvent').onclick=openEventEditor;['sideAddEvent','sideEditEvent'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=openEventEditor});const cl=document.getElementById('cloneEvent');if(cl)cl.onclick=openCloneEvent;const h=document.getElementById('helpBtn');if(h)h.onclick=()=>toast('Tip: set event once, choose template, then capture.')}document.getElementById('topTemplates').onclick=openTemplatePicker;
function renderRecording(){return `<div class="wrap"><section class="main-card"><div class="rec-view"><div class="rec-badge"><span class="live-dot"></span> Recording</div><div class="timer" id="recTimer">0:00</div><div class="record-orb">🎙</div><p class="side-copy" style="max-width:46ch;margin:0 auto">Talk through who you met, what mattered, and the next step. Speak naturally.</p></div></section><aside class="side-card"><div class="side-title"><div class="side-icon">●</div><h2>Recording</h2></div><p class="side-copy">Template: <strong>${esc(currentTemplate().name)}</strong><br>Event: <strong>${app.event&&app.event.name?esc(app.event.name):'No event set'}</strong></p></aside></div>`}
function bindRecording(){const bar=document.getElementById('actionBar');bar.style.display='block';bar.innerHTML='<div class="action-inner"><button class="btn btn-danger" id="stopBtn">■ Stop Recording</button></div>';document.getElementById('stopBtn').onclick=stopRecording}
function renderReview(){const p=app.person,t=currentTemplate();const signals=(t.signals||[]).map(s=>`<option value="${esc(s)}" ${p.signal===s?'selected':''}>${esc(s)}</option>`).join('');const secs=Math.round(app.durationMs/1000),dur=`${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;return `<div class="wrap"><section class="main-card"><div class="review-view"><div class="label">Review & save</div><h1 class="template-name" style="font-size:36px;margin-bottom:12px">Lock in the relationship.</h1><p class="side-copy">Audio ready ${dur}. Add the key details so this lands cleanly in your Relationship Hub.</p><div class="form"><div class="notice"><strong>AI enrichment pending.</strong><br>Whisper transcription and drafted follow-up will run once the OpenAI key is connected. This local capture still saves now.</div><div class="row"><div class="field"><label>Who did you meet?</label><input class="input" id="f-name" value="${esc(p.name)}" placeholder="Name"></div><div class="field"><label>Company</label><input class="input" id="f-company" value="${esc(p.company)}" placeholder="Company"></div></div><div class="field"><label>Role / title</label><input class="input" id="f-role" value="${esc(p.role)}" placeholder="e.g. Head of Partnerships"></div><div class="field"><label>What was discussed</label><textarea class="textarea" id="f-summary" placeholder="What mattered, why it is worth following up…">${esc(p.summary)}</textarea></div><div class="row"><div class="field"><label>Signal</label><select class="input" id="f-signal"><option value="">— none —</option>${signals}</select></div><div class="field"><label>Momentum</label><select class="input" id="f-momentum"><option value="">— none —</option>${['Act Soon','Keep Warm','Connector','Opportunity','Strategic Partner'].map(x=>`<option ${p.momentum===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="field"><label>Next step</label><input class="input" id="f-next" value="${esc(p.nextStep)}" placeholder="e.g. Send the case study and book a call"></div></div></div></section><aside class="side-card"><div class="side-title"><div class="side-icon">▤</div><h2>Capture Details</h2></div><p class="side-copy">Template: <strong>${esc(t.name)}</strong><br>${app.event&&app.event.name?'Event: <strong>'+esc(app.event.name)+'</strong>':'No event context set'}</p></aside></div>`}
function bindReview(){const bar=document.getElementById('actionBar');bar.style.display='block';bar.innerHTML='<div class="action-inner"><button class="btn btn-secondary" id="discardBtn">Discard</button><button class="btn btn-primary" id="saveBtn">Save to Relationship Hub</button></div>';document.getElementById('saveBtn').onclick=saveCapture;document.getElementById('discardBtn').onclick=()=>{if(confirm('Discard this capture?')){resetRecording();app.person=blankPerson();app.screen='ready';render()}}}
function renderSaved(){const ev=app.event,name=app.lastSavedName||'this person';return `<div class="wrap"><section class="main-card"><div class="saved-view"><div style="font-size:54px;color:var(--success)">✓</div><h1 class="template-name" style="font-size:38px">Saved to your Hub.</h1><p class="side-copy" style="max-width:46ch;margin:12px auto 26px">${esc(name)} is in your Relationship Hub. ${ev&&ev.name?'Event context kept: '+esc(ev.name)+'.':'Add an event next time to group contacts.'}</p><div class="action-inner" style="justify-content:center;flex-wrap:wrap"><button class="btn btn-primary" id="anotherBtn">✦ Capture Another Person</button><a class="btn btn-secondary" href="relationship-hub.html">Go to Relationship Hub</a></div></div></section><aside class="side-card"><div class="side-title"><div class="side-icon">✓</div><h2>Ready</h2></div><p class="side-copy">The same event and template stay selected so you can continue fast.</p></aside></div>`}
function bindSaved(){document.getElementById('anotherBtn').onclick=()=>{resetRecording();app.person=blankPerson();app.lastSavedName='';app.screen='ready';render();toast('Same event kept — new person')}}
async function startRecording(){app.chunks=[];if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||typeof MediaRecorder==='undefined'){toast('Recording not supported here');enterReviewWithoutAudio();return}try{app.stream=await navigator.mediaDevices.getUserMedia({audio:true});app.mediaRecorder=new MediaRecorder(app.stream);app.mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size>0)app.chunks.push(e.data)};app.mediaRecorder.onstop=finalizeRecording;app.mediaRecorder.start();app.timerStart=Date.now();app.screen='recording';render();app.timerInt=setInterval(()=>{const n=document.getElementById('recTimer');if(n){const s=Math.floor((Date.now()-app.timerStart)/1000);n.textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}},250)}catch(e){console.warn(e);if(confirm('Microphone access was blocked. Continue without audio?'))enterReviewWithoutAudio()}}
function stopRecording(){if(app.timerInt){clearInterval(app.timerInt);app.timerInt=null}app.durationMs=Date.now()-app.timerStart;if(app.mediaRecorder&&app.mediaRecorder.state!=='inactive')app.mediaRecorder.stop();else finalizeRecording()}function finalizeRecording(){try{if(app.chunks.length){app.audioBlob=new Blob(app.chunks,{type:(app.mediaRecorder&&app.mediaRecorder.mimeType)||'audio/webm'});app.audioUrl=URL.createObjectURL(app.audioBlob)}}catch(e){}stopStream();app.screen='review';render()}function enterReviewWithoutAudio(){app.audioBlob=null;app.audioUrl=null;app.durationMs=0;app.screen='review';render()}function stopStream(){if(app.stream){app.stream.getTracks().forEach(t=>t.stop());app.stream=null}}function resetRecording(){if(app.timerInt)clearInterval(app.timerInt);if(app.audioUrl)try{URL.revokeObjectURL(app.audioUrl)}catch(e){}stopStream();app.mediaRecorder=null;app.chunks=[];app.audioBlob=null;app.audioUrl=null;app.durationMs=0}
function readPerson(){const g=id=>document.getElementById(id)?.value.trim()||'';app.person={name:g('f-name'),company:g('f-company'),role:g('f-role'),summary:g('f-summary'),nextStep:g('f-next'),signal:g('f-signal'),momentum:g('f-momentum')}}function buildCapture(){const p=app.person,t=currentTemplate(),ev=app.event;const filled=[p.name,p.company,p.summary,p.nextStep,p.signal].filter(Boolean).length;return{id:uid(),name:p.name||null,company:p.company||null,role:p.role||null,signal:p.signal||null,signalLabel:p.momentum||p.signal||null,evidence:p.summary||null,secondaryThread:null,priority:p.momentum||null,action:p.nextStep||null,draftMessage:null,context:ev&&ev.name?`Met at ${[ev.name,ev.location,ev.date].filter(Boolean).join(', ')}`:'Captured conversation',capturedAt:new Date().toISOString(),event:ev&&ev.name?[ev.name,ev.session,ev.location].filter(Boolean).join(' · '):null,eventKey:ev&&ev.key?ev.key:null,outcome:'active',template:t.id,templateName:t.name,needsNameConfirmation:!p.name,nameConfidence:p.name?'confirmed':null,completeness:Math.round(filled/5*100),hasAudio:!!app.audioBlob,audioDurationMs:app.durationMs||0,aiStatus:'pending_openai'}}function saveCapture(){readPerson();const cap=buildCapture();const list=readJSON(STORAGE.CAPTURES,[]);list.unshift(cap);localStorage.setItem(STORAGE.CAPTURES,JSON.stringify(list));app.lastSavedName=cap.name||'Unnamed contact';try{fetch('/api/captures',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:localStorage.getItem(STORAGE.USER_ID)||'local_user',...cap})}).catch(()=>{})}catch(e){}app.screen='saved';render()}
function openTemplatePicker(){const sheet=document.getElementById('tplSheet');const rows=TEMPLATES.map(base=>{const t=effectiveTemplate(base),usable=canUse(base,app.plan),selected=base.id===app.templateId;const label=base.id==='opportunity'?'Starter example':base.tier==='pro'?'Pro':'Starter waitlist';return `<button class="tpl-option ${selected?'selected':''} ${usable?'':'locked'}" data-id="${base.id}" ${usable?'':'data-locked="1"'}><div><div class="tpl-name">${esc(t.name)}</div><div class="tpl-sum">${esc(t.summary)}</div></div><span class="badge ${base.tier==='pro'?'pro':''}">${label}</span></button>`}).join('');sheet.innerHTML=`<div class="grip"></div><h2>Choose a template</h2><div class="sheet-sub">Opportunity is available as the Starter example. Other templates are visible so users understand what unlocks next.</div>${rows}`;sheet.querySelectorAll('.tpl-option').forEach(b=>b.onclick=()=>{if(b.dataset.locked){toast('Join the waitlist / upgrade to unlock this template');return}app.templateId=b.dataset.id;localStorage.setItem(STORAGE.SELECTED_TEMPLATE,app.templateId);closeOverlay('tplOverlay');render();toast('Template selected')});showOverlay('tplOverlay')}
function eventForm(ev={},clone=false){return `<div class="grip"></div><h2>${clone?'Clone event context':'Event context'}</h2><div class="sheet-sub">${clone?'Keep the event details and change only the area/session for the next group.':'Set this once. Every person you capture here is grouped together.'}</div><div class="form"><div class="field"><label>Event name</label><input class="input" id="ev-name" value="${esc(ev.name||'')}" placeholder="e.g. SaaStr Annual 2026"></div><div class="row"><div class="field"><label>Location / area</label><input class="input" id="ev-location" value="${esc(clone?'':ev.location||'')}" placeholder="e.g. Hall B / Booth 12"></div><div class="field"><label>Session</label><input class="input" id="ev-session" value="${esc(clone?'':ev.session||'')}" placeholder="e.g. Founders mixer"></div></div><div class="row"><div class="field"><label>Date / time</label><input class="input" id="ev-date" value="${esc(ev.date||'')}" placeholder="e.g. 12 Jun, evening"></div><div class="field"><label>Environment</label><select class="input" id="ev-type">${['','Conference','Meetup','Networking mixer','Dinner','Workshop','Pitch event','1:1 coffee','Other'].map(o=>`<option value="${esc(o)}" ${(ev.type||'')===o?'selected':''}>${o?esc(o):'— type —'}</option>`).join('')}</select></div></div><button class="btn btn-primary" id="ev-save">${clone?'Save cloned event':'Save event context'}</button>${ev.name&&!clone?'<button class="btn btn-secondary" id="ev-clear" type="button">Clear event</button>':''}</div>`}
function saveEventFromSheet(){const sheet=document.getElementById('eventSheet'),g=id=>sheet.querySelector('#'+id)?.value.trim()||'';const name=g('ev-name');if(!name){toast('Give the event a name');return}const ev={name,location:g('ev-location'),session:g('ev-session'),date:g('ev-date'),type:g('ev-type'),key:slug(name)+'-'+slug(g('ev-location')||g('ev-session')||g('ev-date')||Date.now())};app.event=ev;localStorage.setItem(STORAGE.EVENT,JSON.stringify(ev));closeOverlay('eventOverlay');render();toast('Event context saved')}
function openEventEditor(){const sheet=document.getElementById('eventSheet');sheet.innerHTML=eventForm(app.event||{},false);sheet.querySelector('#ev-save').onclick=saveEventFromSheet;const c=sheet.querySelector('#ev-clear');if(c)c.onclick=()=>{app.event=null;localStorage.removeItem(STORAGE.EVENT);closeOverlay('eventOverlay');render();toast('Event cleared')};showOverlay('eventOverlay')}function openCloneEvent(){const sheet=document.getElementById('eventSheet');sheet.innerHTML=eventForm(app.event||{},true);sheet.querySelector('#ev-save').onclick=saveEventFromSheet;showOverlay('eventOverlay')}
function showOverlay(id){document.getElementById(id).classList.add('show')}function closeOverlay(id){document.getElementById(id).classList.remove('show')}['tplOverlay','eventOverlay'].forEach(id=>document.getElementById(id).onclick=e=>{if(e.target.id===id)closeOverlay(id)});render();
</script></body></html>
