<div class="sheet-wrap" id="eventOverlay"><div class="sheet" id="eventSheet"></div></div>

<!-- Gut Feel sheet — fires after recording stops, before the AI runs.
     One tap: the user's quick relationship read.
     Sends gutFeel: something_here | good_connection | no_spark | hard_to_read | null. -->
<div id="gut-feel-screen" class="gut-screen" style="display:none">
  <div class="gut-inner">
    <div class="gut-header">
      <h2 class="gut-title">What's your gut feel on this one?</h2>
      <p class="gut-sub">Takes 2 seconds — it makes your follow-up sharper.</p>
    </div>
    <div class="gut-question">
      <div class="gut-options gut-options-single" id="gut-options">
        <button class="gut-btn" data-value="something_here" type="button">
          <span class="gut-icon">🔥</span><span class="gut-text">There's something here</span><span class="gut-hint">real energy, worth noticing</span>
        </button>
        <button class="gut-btn" data-value="good_connection" type="button">
          <span class="gut-icon">🤝</span><span class="gut-text">Good connection</span><span class="gut-hint">warm, useful, worth keeping open</span>
        </button>
        <button class="gut-btn" data-value="no_spark" type="button">
          <span class="gut-icon">👋</span><span class="gut-text">Good to meet, no spark</span><span class="gut-hint">pleasant, but no real pull</span>
        </button>
        <button class="gut-btn" data-value="hard_to_read" type="button">
          <span class="gut-icon">🤔</span><span class="gut-text">Hard to read</span><span class="gut-hint">not enough signal yet</span>
        </button>
      </div>
    </div>
    <div class="gut-actions">
      <button class="gut-done" id="gut-done-btn" type="button" disabled>Done — prepare capture</button>
      <button class="gut-skip" id="gut-skip-btn" type="button">Skip for now</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="tapd-intelligence-framework.js?v=20260613c"></script>
<script src="tapd-sync.js?v=20260613c"></script>

</body>
