<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="TAPDconnex Capture — record a networking conversation and turn it into a relationship">
<title>Capture — TAPDconnex</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ============ DESIGN SYSTEM (matches Hub + Onboarding) ============ */
  :root {
    --bg: #F6F2EA;
    --bg-paper: #F2EDE2;
    --surface: #FFFFFF;
    --surface-warm: #FBF8F2;
    --text-primary: #181410;
    --text-secondary: #5C5247;
    --text-muted: #95887A;
    --text-faint: #C2B7A8;
    --border-soft: #EAE2D2;
    --border-medium: #D9CDB6;
    --accent: #1E4F5C;
    --accent-hover: #14404C;
    --accent-bg: #E8EFEF;
    --warm-accent: #B8501E;
    --warm-bg: #FBEDD9;
    --pro: #7C2D3F;
    --pro-bg: #F5E8EC;
    --pro-soft: #FAF2F4;
    --success: #2D6A4F;
    --success-bg: #DCEFE3;
    --recording: #C24545;
    --recording-bg: #FBE5E5;
    --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
    --space-5: 20px; --space-6: 24px; --space-7: 32px; --space-8: 40px; --space-9: 56px;
    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
    --radius-xl: 20px; --radius-pill: 999px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --shadow-sm: 0 1px 2px rgba(24, 20, 16, 0.04);
    --shadow-md: 0 2px 8px rgba(24, 20, 16, 0.06);
    --shadow-lg: 0 8px 24px rgba(24, 20, 16, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ============ SHELL ============ */
  .shell {
    max-width: 680px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 0 0 120px;
    position: relative;
  }

  /* ============ HEADER ============ */
  .top {
    padding: var(--space-5) var(--space-5) var(--space-4);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 50;
    border-bottom: 1px solid var(--border-soft);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
  }
  .brand-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.005em;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .header-btn {
    background: transparent;
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-pill);
    padding: 8px 14px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .header-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  /* ============ STEP CONTENT ============ */
  .step-content {
    padding: 0 var(--space-5);
    animation: stepEnter 0.4s ease-out;
  }
  @keyframes stepEnter {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    margin-top: var(--space-7);
  }
  .step-headline {
    font-family: var(--font-display);
    font-size: clamp(28px, 5vw, 34px);
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 14px;
  }
  .step-headline em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .step-sub {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: var(--space-7);
  }

  /* ============ TEMPLATE PICKER ============ */
  .template-section-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: var(--space-7) 0 var(--space-3);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .template-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-soft);
  }

  .template-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .template-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: 18px var(--space-5);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .template-card:hover:not(.locked) {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .template-card.locked {
    background: var(--pro-soft);
    cursor: pointer;
  }
  .template-card.locked:hover {
    border-color: var(--pro);
  }
  .template-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .template-card-name {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.005em;
    line-height: 1.2;
  }
  .template-card.locked .template-card-name {
    color: var(--text-secondary);
  }
  .template-card-summary {
    font-family: var(--font-display);
    font-size: 14px;
    font-style: italic;
    color: var(--text-secondary);
    line-height: 1.45;
    margin-bottom: 12px;
  }
  .template-card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .outcome-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 4px 8px;
    border-radius: 5px;
    font-weight: 600;
  }
  .pro-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--pro);
    background: var(--pro-bg);
    padding: 4px 8px;
    border-radius: 5px;
    font-weight: 600;
  }
  .edited-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--success);
    background: var(--success-bg);
    padding: 4px 8px;
    border-radius: 5px;
    font-weight: 600;
  }

  /* ============ CHEAT SHEET PREVIEW ============ */
  .cheat-preview {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    margin-bottom: var(--space-5);
  }
  .cheat-preview-section {
    margin-bottom: var(--space-5);
  }
  .cheat-preview-section:last-child {
    margin-bottom: 0;
  }
  .cheat-preview-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .cheat-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cheat-list li {
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.55;
    padding-left: 24px;
    position: relative;
    font-family: var(--font-display);
    font-style: italic;
  }
  .cheat-list li::before {
    content: '\2014';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-style: normal;
  }
  .cheat-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cheat-tag {
    background: var(--surface-warm);
    border: 1px solid var(--border-soft);
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .cheat-helper {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    margin-top: var(--space-3);
    text-align: center;
  }

  /* ============ RECORDING SCREEN ============ */
  .record-shell {
    min-height: calc(100vh - 80px);
    display: flex;
    flex-direction: column;
    padding: var(--space-5);
  }
  .record-context {
    text-align: center;
    margin-bottom: var(--space-7);
  }
  .record-context-template {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .record-context-summary {
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text-secondary);
    font-style: italic;
  }

  .timer-block {
    text-align: center;
    margin: var(--space-7) auto;
  }
  .timer-display {
    font-family: var(--font-display);
    font-size: 64px;
    font-weight: 500;
    letter-spacing: -0.04em;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 12px;
    font-variant-numeric: tabular-nums;
  }
  .timer-display.recording {
    color: var(--recording);
  }
  .timer-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .recording-dot {
    width: 8px;
    height: 8px;
    background: var(--recording);
    border-radius: 50%;
    animation: recordPulse 1.4s ease-in-out infinite;
  }
  @keyframes recordPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .timer-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 12px;
  }

  /* ============ RECORD BUTTON CLUSTER ============ */
  .record-cluster {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: auto 0 var(--space-7);
    gap: var(--space-4);
  }

  .record-button {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 8px 24px rgba(30, 79, 92, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .record-button:hover {
    transform: scale(1.02);
  }
  .record-button:active {
    transform: scale(0.96);
  }
  .record-button.recording {
    background: var(--recording);
    box-shadow: 0 0 0 8px var(--recording-bg), 0 8px 24px rgba(194, 69, 69, 0.25);
  }
  .record-button.recording::before {
    content: '';
    width: 28px;
    height: 28px;
    background: white;
    border-radius: 4px;
  }
  .record-button:not(.recording)::before {
    content: '';
    width: 32px;
    height: 32px;
    background: white;
    border-radius: 50%;
  }

  .record-controls {
    display: flex;
    gap: var(--space-3);
    align-items: center;
  }
  .control-btn {
    background: var(--surface);
    border: 1px solid var(--border-medium);
    color: var(--text-secondary);
    padding: 10px var(--space-5);
    border-radius: var(--radius-pill);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .control-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  /* ============ CHEAT SHEET PEEK PANEL ============ */
  .cheat-peek {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border-soft);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    box-shadow: 0 -8px 32px rgba(24, 20, 16, 0.08);
    z-index: 40;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    max-width: 680px;
    margin: 0 auto;
    transform: translateY(calc(100% - 60px));
  }
  .cheat-peek.expanded {
    transform: translateY(0);
  }
  .cheat-peek-handle {
    padding: var(--space-3) var(--space-5);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
  }
  .cheat-peek.expanded .cheat-peek-handle {
    border-bottom-color: var(--border-soft);
  }
  .cheat-peek-handle-grip {
    width: 36px;
    height: 4px;
    background: var(--border-medium);
    border-radius: 2px;
    margin: 0 auto var(--space-2);
  }
  .cheat-peek-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    font-weight: 600;
  }
  .cheat-peek-toggle {
    color: var(--text-muted);
    font-family: var(--font-display);
    font-size: 20px;
    line-height: 1;
  }
  .cheat-peek-body {
    padding: var(--space-3) var(--space-5) var(--space-7);
    max-height: 50vh;
    overflow-y: auto;
  }

  /* ============ TRANSCRIBING / STRUCTURING ============ */
  .processing {
    min-height: calc(100vh - 80px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-7) var(--space-5);
    text-align: center;
  }
  .processing-headline {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    color: var(--text-primary);
  }
  .processing-headline em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .processing-sub {
    font-size: 14px;
    color: var(--text-secondary);
    max-width: 320px;
    line-height: 1.5;
    margin-bottom: var(--space-7);
  }
  .processing-steps {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .processing-step {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    padding: 14px var(--space-4);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    color: var(--text-secondary);
    transition: all 0.3s ease;
  }
  .processing-step.active {
    border-color: var(--accent);
    background: var(--accent-bg);
    color: var(--accent);
  }
  .processing-step.done {
    color: var(--success);
    background: var(--success-bg);
    border-color: var(--success-bg);
  }
  .processing-step-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid currentColor;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
  }
  .processing-step.done .processing-step-icon::after {
    content: '\2713';
  }
  .processing-step.active .processing-step-icon {
    animation: rotate 1.4s linear infinite;
    border-top-color: transparent;
  }
  @keyframes rotate {
    to { transform: rotate(360deg); }
  }

  /* ============ DRAFT REVIEW ============ */
  .completeness-strip {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: 14px var(--space-5);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-4);
  }
  .completeness-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .completeness-score {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .completeness-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    font-weight: 600;
  }
  .completeness-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .confidence-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .confidence-tag[data-level="high"] { background: var(--success-bg); color: var(--success); }
  .confidence-tag[data-level="medium"] { background: var(--warm-bg); color: var(--warm-accent); }
  .confidence-tag[data-level="low"] { background: var(--pro-bg); color: var(--pro); }

  /* ============ COMPLETION MODE (PRO) ============ */
  .completion-mode {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    margin-bottom: var(--space-4);
  }
  .completion-mode[data-urgent="true"] {
    border-color: var(--warm-accent);
    background: linear-gradient(135deg, #FFFBF4 0%, #FBEDD9 100%);
  }
  .completion-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--pro);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .completion-mode[data-urgent="true"] .completion-eyebrow {
    color: var(--warm-accent);
  }
  .completion-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: var(--space-3);
    line-height: 1.3;
  }
  .completion-critical {
    margin-bottom: var(--space-3);
  }
  .completion-section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--warm-accent);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .completion-quality-label {
    color: var(--text-muted);
  }
  .completion-fields {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: var(--space-4);
  }
  .completion-fields li {
    font-size: 14px;
    color: var(--text-primary);
    padding-left: 18px;
    position: relative;
  }
  .completion-fields li::before {
    content: '\2013';
    position: absolute;
    left: 0;
    color: var(--warm-accent);
  }
  .completion-quality-list li::before {
    color: var(--text-muted);
  }
  .completion-actions {
    display: flex;
    gap: 8px;
    margin-top: var(--space-4);
  }

  /* ============ STARTER UPGRADE TRIGGER ============ */
  .upgrade-trigger {
    background: linear-gradient(135deg, var(--pro-soft) 0%, var(--pro-bg) 100%);
    border: 1px solid var(--pro);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    margin-bottom: var(--space-4);
  }
  .upgrade-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--pro);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .upgrade-headline {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--text-primary);
    margin-bottom: 12px;
    letter-spacing: -0.005em;
  }
  .upgrade-headline strong {
    color: var(--pro);
    font-weight: 600;
  }
  .upgrade-action {

// ============ OWNER STYLE (from onboarding) ============
function loadOwnerStyle() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE.ONBOARDING));
    return (raw && raw.data) ? raw.data : null;
  } catch (e) { return null; }
}
function onboardingDefaultTemplateId() {
  const o = loadOwnerStyle();
  return o && o.selectedTemplate ? o.selectedTemplate : null;
}

// Compose the outbound draft in the owner's voice. Never invents a voice:
// if no Owner Style is set, the AI/mock message is left untouched.
function applyOwnerStyle(ai) {
  const o = loadOwnerStyle();
  if (!o || !o.greeting) return ai;
  const firstName = (ai.person && ai.person.name) ? ai.person.name.split(' ')[0] : '[First name]';
  const fill = (s) => (s || '')
    .replace(/\[First name\]/gi, firstName)
    .replace(/\[My name\]/gi, o.name || '')
    .replace(/\[Where we met\]/gi, (ai.draft && ai.draft.eventLabel) || 'the event')
    .replace(/\[What we discussed\]/gi, (ai.draft && ai.draft.topic) || (ai.signal && ai.signal.evidence) || 'what you\u2019re working on')
    .replace(/\[Next step\]/gi, (ai.draft && ai.draft.nextStep) || '');
  ai.draft.message = [
    fill(o.greeting), '',
    fill(o.opening),
    fill(o.conversationRef), '',
    fill(o.nextStepStyle), '',
    fill(o.signOff)
  ].join('\n').replace(/\n{3,}/g, '\n\n').trim();
  ai.draft._ownerVoiced = true;
  return ai;
}

// ============ QUICK TEMPLATE SWITCHER ============
function updateTemplateBar() {
  const bar = document.getElementById('templateBar');
  if (!bar) return;
  const t = state.selectedTemplate;
  // Hide on picker (the screen IS the picker) and processing (busy)
  const hidden = !t || state.screen === 'picker' || state.screen === 'processing';
  if (hidden) { bar.innerHTML = ''; return; }
  bar.innerHTML = `
    <div class="tpl-bar">
      <span class="tpl-bar-label">Template</span>
      <button class="tpl-bar-chip" id="tplBarChip" type="button">
        <span>${esc(t.name)}</span>
        <span class="tpl-bar-caret">\u25BE</span>
      </button>
    </div>`;
  const chip = document.getElementById('tplBarChip');
  if (chip) chip.addEventListener('click', openTemplateSwitcher);
}

function openTemplateSwitcher() {
  if (document.getElementById('tplSwitcher')) return;
  const reprocessing = (state.screen === 'review');
  const current = state.selectedTemplate ? state.selectedTemplate.id : null;
  const list = TEMPLATES.map(t => `
    <button class="tpl-switch-item ${t.id === current ? 'current' : ''}" data-id="${t.id}" type="button">
      <div class="tpl-switch-name">${esc(t.name)} ${t.tier === 'pro' ? '<span class="pro-pill">Pro</span>' : ''}</div>
      <div class="tpl-switch-sum">${esc(t.summary || '')}</div>
    </button>`).join('');
  const overlay = document.createElement('div');
  overlay.id = 'tplSwitcher';
  overlay.className = 'tpl-overlay';
  overlay.innerHTML = `
    <div class="tpl-sheet">
      <div class="tpl-sheet-head">
        <div>
          <div class="tpl-sheet-title">Switch template</div>
          <div class="tpl-sheet-sub">${reprocessing ? 'Choosing a different template will re-process this capture.' : 'The new template applies from here on.'}</div>
        </div>
        <button class="tpl-sheet-close" id="tplSwitchClose" aria-label="Close">\u2715</button>
      </div>
      <div class="tpl-switch-list">${list}</div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('tplSwitchClose').addEventListener('click', closeTemplateSwitcher);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeTemplateSwitcher(); });
  overlay.querySelectorAll('.tpl-switch-item').forEach(btn => {
    btn.addEventListener('click', () => switchTemplate(btn.dataset.id));
  });
}
function closeTemplateSwitcher() {
  const el = document.getElementById('tplSwitcher');
  if (el) el.remove();
}

function switchTemplate(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return closeTemplateSwitcher();
  if (state.selectedTemplate && t.id === state.selectedTemplate.id) return closeTemplateSwitcher();
  if (state.screen === 'review') {
    const ok = confirm(`Re-process this capture with the "${t.name}" template? The draft will be rebuilt.`);
    if (!ok) return closeTemplateSwitcher();
    state.selectedTemplate = t;
    closeTemplateSwitcher();
    state.screen = 'processing';
    render();
    runProcessing();
    return;
  }
  state.selectedTemplate = t;
  closeTemplateSwitcher();
  render();
}

        <div class="action-bar-inner">
          <button class="btn btn-back" id="backBtn">&larr; Back</button>
          <button class="btn btn-primary" id="startRecordBtn">Got it &mdash; start recording &rarr;</button>
        </div>
      `;
      document.getElementById('backBtn').onclick = () => goTo('picker');
      document.getElementById('startRecordBtn').onclick = () => goTo('recording');
      return;

    case 'recording':
      bar.style.display = 'none';
      bar.innerHTML = '';
      return;

    case 'processing':
      bar.style.display = 'none';
      bar.innerHTML = '';
      return;

    case 'completion_offered':
      bar.style.display = 'block';
      if (state.plan === 'pro') {
        const urgent = state.draft.completeness.criticalMissing.length > 0;
        bar.innerHTML = `
          <div class="action-bar-inner">
            <button class="btn btn-skip-completion" id="skipCompletionBtn">${urgent ? 'Skip \u2014 send to Hub' : 'Looks good \u2014 continue'}</button>
            <button class="btn btn-completion" id="startCompletionBtn">Continue Recording &rarr;</button>
          </div>
        `;
        document.getElementById('skipCompletionBtn').onclick = () => goTo('review');
        document.getElementById('startCompletionBtn').onclick = () => startCompletionMode();
      } else {
        bar.innerHTML = `
          <div class="action-bar-inner">
            <button class="btn btn-primary" id="continueToReviewBtn">Continue to draft &rarr;</button>
          </div>
        `;
        document.getElementById('continueToReviewBtn').onclick = () => goTo('review');
      }
      return;

    case 'review':
      bar.style.display = 'block';
      bar.innerHTML = `
        <div class="action-bar-inner">
          <button class="btn btn-secondary" id="saveBtn">Save to Hub</button>
          <button class="btn btn-primary" id="sendBtn">Open in WhatsApp &rarr;</button>
        </div>
      `;
      document.getElementById('saveBtn').onclick = () => saveAndGoToHub();
      document.getElementById('sendBtn').onclick = () => sendViaWhatsApp();
      return;

    default:
      bar.style.display = 'none';
  }
}

// ============ NAVIGATION ============
function goTo(screen) {
  state.screen = screen;
  if (screen === 'recording') {
    state.elapsed = 0;
    state.recording = false;
    state.paused = false;
  }
  render();

  // Trigger processing if entering that screen
  if (screen === 'processing') {
    runProcessing();
  }
}

// ============ EVENT BINDING ============
function bindEvents() {

  // Template selection
  document.querySelectorAll('.template-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.templateId;
      const t = TEMPLATES.find(x => x.id === id);
      if (!t) return;
      openTemplatePreview(t, card.dataset.locked === 'true');
    });
  });

  // Recording button
  const recordBtn = document.getElementById('recordBtn');
  if (recordBtn) recordBtn.onclick = handleRecordToggle;
  const pauseBtn = document.getElementById('pauseBtn');
  if (pauseBtn) pauseBtn.onclick = handlePauseResume;
  const stopBtn = document.getElementById('stopBtn');
  if (stopBtn) stopBtn.onclick = handleStop;

  // Cheat peek
  const peekHandle = document.getElementById('cheatPeekHandle');
  if (peekHandle) peekHandle.onclick = () => {
    state.cheatPeekExpanded = !state.cheatPeekExpanded;
    document.getElementById('cheatPeek').classList.toggle('expanded');
    document.querySelector('.cheat-peek-toggle').textContent = state.cheatPeekExpanded ? '\u02C5' : '\u02C4';
  };

  // Modal close
  document.querySelectorAll('[data-close-modal]').forEach(btn => {
    btn.onclick = () => document.getElementById(btn.dataset.closeModal).classList.remove('active');
  });

  // Channel options
  document.querySelectorAll('.channel-option').forEach(opt => {
    opt.onclick = () => {
      document.querySelectorAll('.channel-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      state.selectedChannel = opt.dataset.channel;
    };
  });

  // Upgrade button (placeholder)
  const upgradeBtn = document.getElementById('upgradeBtn');
  if (upgradeBtn) upgradeBtn.onclick = () => {
    showToast('Pro upgrade coming soon. For demo: set localStorage tapd_user_plan = pro');
  };

  // Popover dismiss
  const dismissBtn = document.getElementById('dismissPopover');
  if (dismissBtn) dismissBtn.onclick = dismissPopover;
}

// ============ TEMPLATE PREVIEW MODAL ============
function openTemplatePreview(template, locked) {
  document.getElementById('modalTemplateName').textContent = template.name;
  document.getElementById('modalTemplateSummary').textContent = template.summary;

  document.getElementById('modalTemplateBody').innerHTML = `
    <div class="cheat-preview-section">
      <div class="cheat-preview-label">Questions to ask</div>
      <ul class="cheat-list">
        ${template.questions.slice(0, 5).map(q => `<li>${escapeHtml(q)}</li>`).join('')}
        ${template.questions.length > 5 ? `<li style="font-style: normal; color: var(--text-muted); font-family: var(--font-body);">\u2026 and ${template.questions.length - 5} more questions during recording</li>` : ''}
      </ul>
    </div>
    <div class="cheat-preview-section" style="margin-top: var(--space-5);">
      <div class="cheat-preview-label">Listen for</div>
      <div class="cheat-tags">
        ${template.signals.map(s => `<span class="cheat-tag">${escapeHtml(s)}</span>`).join('')}
      </div>
    </div>
    <div class="cheat-preview-section" style="margin-top: var(--space-5);">
      <div class="cheat-preview-label">What to offer</div>
      <div class="cheat-tags">
        ${template.whatToOffer.map(o => `<span class="cheat-tag">${escapeHtml(o)}</span>`).join('')}
      </div>
    </div>
  `;

  if (locked) {
    document.getElementById('modalTemplateActions').innerHTML = `
      <button class="btn btn-secondary" data-close-modal="templateModal" style="flex: 1;">Close</button>
      <button class="btn btn-completion" style="flex: 1;" onclick="alert('Pro upgrade coming soon')">Unlock Pro</button>
    `;
  } else {
    document.getElementById('modalTemplateActions').innerHTML = `
      <button class="btn btn-secondary" data-close-modal="templateModal" style="flex: 1;">Close</button>
      <button class="btn btn-primary" id="useThisTemplateBtn" style="flex: 1;">Use this template</button>
    `;
    document.getElementById('useThisTemplateBtn').onclick = () => {
      state.selectedTemplate = template;
      document.getElementById('templateModal').classList.remove('active');
      goTo('cheat');
    };
  }

  document.querySelectorAll('[data-close-modal]').forEach(btn => {
    btn.onclick = () => document.getElementById(btn.dataset.closeModal).classList.remove('active');
  });

  document.getElementById('templateModal').classList.add('active');
}

// ============ RECORDING LOGIC ============
async function handleRecordToggle() {
  if (!state.recording) {
    await startRecording();
  } else {
    handleStop();
  }
}

async function startRecording() {
  try {
    // Request mic permission
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    state.audio.stream = stream;
    state.audio.chunks = [];

    const recorder = new MediaRecorder(stream);
    state.audio.recorder = recorder;

    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) state.audio.chunks.push(e.data);
    };

    recorder.start();
    state.recording = true;
    state.paused = false;
    startTimer();
    render();

    // Warn before leaving
    window.addEventListener('beforeunload', warnBeforeLeaving);
  } catch (err) {
    console.error('Recording failed:', err);
    showToast('Microphone access denied. Allow mic to capture conversations.');
  }
}

function handlePauseResume() {
  if (!state.audio.recorder) return;
  if (state.paused) {
    state.audio.recorder.resume();
    state.paused = false;
    startTimer();
  } else {
    state.audio.recorder.pause();
    state.paused = true;
    stopTimer();
  }
  render();
}

function handleStop() {
  if (!state.audio.recorder) return;
  state.audio.recorder.stop();
  state.audio.stream.getTracks().forEach(t => t.stop());
  state.recording = false;
  state.paused = false;
  stopTimer();
  window.removeEventListener('beforeunload', warnBeforeLeaving);

  goTo('processing');
}

function startTimer() {
  stopTimer();
  state.timerInterval = setInterval(() => {
    state.elapsed++;
    if (state.elapsed >= getMaxSeconds()) {
      handleStop();
      return;
    }
    // Update just the timer display
    const display = document.querySelector('.timer-display');
    if (display) {
      const max = getMaxSeconds();
      const remaining = max - state.elapsed;
      const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
      const ss = String(remaining % 60).padStart(2, '0');
      display.textContent = `${mm}:${ss}`;
    }
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function warnBeforeLeaving(e) {
  e.preventDefault();
  e.returnValue = '';
  return '';
}

// ============ PROCESSING (mock for now) ============
async function runProcessing() {
  const setStep = (id, cls) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('active', 'done');
    if (cls) el.classList.add(cls);
  };
  setTimeout(() => { setStep('step2', 'done'); setStep('step3', 'active'); }, 1500);

  // Try the real pipeline; fall back to a local draft if endpoints aren't live yet.
  let ai = null;
  try { ai = await processViaApi(); }
  catch (e) { console.warn('Capture API unavailable, using local draft:', e); }
  if (!ai) ai = generateMockAIResponse(state.selectedTemplate, 'mock transcript');

  // Continuation recording merges INTO the existing draft — never a second person.
  if (state.isCompletionMode && state.draft) ai = mergeDrafts(state.draft, ai);

  // Draft in the owner's voice (if Owner Style is set)
  ai = applyOwnerStyle(ai);

  state.draft = ai;
  state.transcriptConfidence = ai.verification.needsNameConfirmation ? 'low' : 'high';
  setStep('step3', 'done');

  const hasAnyMissing = ai.completeness.criticalMissing.length > 0 || ai.completeness.qualityMissing.length > 0;
  setTimeout(() => {
    if (hasAnyMissing && !state.isCompletionMode) goTo('completion_offered');
    else goTo('review');
  }, 600);
}

// Real transcription + structuring. Returns null (→ fallback) if endpoints aren't live.
async function processViaApi() {
  const blob = new Blob(state.audio.chunks, { type: 'audio/webm' });
  if (!blob.size) return null;

  const fd = new FormData();
  fd.append('audio', blob, 'capture.webm');
  const tRes = await fetch(ENDPOINTS.transcribe, { method: 'POST', body: fd });
  if (!tRes.ok) return null;
  const tJson = await tRes.json();
  if (tJson.status === 'placeholder' || !tJson.transcript) return null;

  const tpl = state.selectedTemplate;
  const sRes = await fetch(ENDPOINTS.structure, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      transcript: tJson.transcript,
      template: {
        id: tpl.id, name: tpl.name,
        questions: tpl.questions, signals: tpl.signals,
        whatToOffer: tpl.whatToOffer,
        aiListening: tpl.aiListening || tpl.signals
      },
      ownerStyle: loadOwnerStyle()
    })
  });
  if (!sRes.ok) return null;
  const sJson = await sRes.json();
  if (sJson.status === 'placeholder' || !sJson.person) return null;
  return sJson;
}

// Merge a continuation pass into the prior draft (fill gaps, keep what we had).
function mergeDrafts(prev, next) {
  const m = JSON.parse(JSON.stringify(prev));
  ['name', 'company', 'role'].forEach(k => { if (!m.person[k] && next.person[k]) m.person[k] = next.person[k]; });
  if (m.person.nameConfidence !== 'high' && next.person.nameConfidence === 'high') m.person.nameConfidence = 'high';
  if (next.draft.context && next.draft.context.length > (m.draft.context || '').length) m.draft.context = next.draft.context;
  if (next.draft.nextStep) m.draft.nextStep = next.draft.nextStep;
  const crit = [];
  if (!m.person.name) crit.push('Person name');
  if (!m.person.company) crit.push('Company');
  m.completeness = m.completeness || { score: 0, scoreLabel: '', criticalMissing: [], qualityMissing: [] };
  m.completeness.criticalMissing = crit;
  m.verification = m.verification || {};
  m.verification.needsNameConfirmation = !m.person.name;
  return m;
}

// ============ COMPLETION MODE (PRO) ============
function startCompletionMode() {
  state.isCompletionMode = true;
  state.screen = 'recording';
  state.elapsed = 0;
  state.recording = false;
  state.paused = false;
  render();
}

// ============ SAVE & SEND ============
function saveAndGoToHub() {
  const capture = buildCaptureForHub();
  saveCaptureToHub(capture);

  if (state.isFirstCapture && capture.needsNameConfirmation) {
    setTimeout(() => showFirstCapturePopover(), 400);
  }

  showToast('Saved to Hub');
  setTimeout(() => { window.location.href = 'relationship-hub.html'; }, 1200);
}

function sendViaWhatsApp() {
  const capture = buildCaptureForHub();
  saveCaptureToHub(capture);

  const message = document.getElementById('draftText').value;
  const url = `https://wa.me/?text=${encodeURIComponent(message)}`;

  if (state.isFirstCapture && capture.needsNameConfirmation) {
    showFirstCapturePopover();
    setTimeout(() => window.open(url, '_blank'), 1500);
  } else {
    window.open(url, '_blank');
  }

  showToast('Saved to Hub \u00b7 WhatsApp opening');
  setTimeout(() => { window.location.href = 'relationship-hub.html'; }, 1500);
}

function buildCaptureForHub() {
  const ai = state.draft;
  const t = state.selectedTemplate;
  const editedMessage = document.getElementById('draftText')?.value || ai.draft.message;

  return {
    id: 'cap_' + Date.now(),
    name: ai.person.name,
    company: ai.person.company,
    role: ai.person.role,
    signal: ai.signal.primary,
    signalLabel: ai.signal.primaryLabel,
    evidence: ai.signal.evidence,
    secondaryThread: ai.signal.secondary,
    priority: computePriority(ai),
    action: ai.draft.nextStep,
    draftMessage: editedMessage,
    context: ai.draft.context,
    capturedDaysAgo: 0,
    capturedAt: new Date().toISOString(),
    event: '',
    eventKey: '',
    outcome: 'active',
    template: t.id,
    templateName: t.name,
    needsNameConfirmation: ai.verification.needsNameConfirmation,
    nameConfidence: ai.person.nameConfidence,
    completeness: ai.completeness,
    channelPreference: state.selectedChannel,
    transcriptConfidence: state.transcriptConfidence
  };
}

function computePriority(ai) {
  const signal = ai.signal.primary;
  const subtype = ai.signal.primarySubtype;
  const hasNextStep = !!ai.draft.nextStep;

  const highUrgency = ['direct_opportunity', 'pilot_beta', 'investor', 'speaking_opportunity'];

  if (signal === 'opportunity' && hasNextStep) return 'act-soon';
  if (highUrgency.includes(subtype)) return 'act-soon';
  if (signal === 'stay') return 'keep-warm';
  return 'worth-exploring';
}

function saveCaptureToHub(capture) {
  const existing = JSON.parse(localStorage.getItem(STORAGE.CAPTURES) || '[]');
  existing.unshift(capture);
  localStorage.setItem(STORAGE.CAPTURES, JSON.stringify(existing));
  try { if (window.TapdSync) TapdSync.pushCapture(capture); } catch (e) {}
}

// ============ FIRST-CAPTURE POPOVER ============
function showFirstCapturePopover() {
  const shown = localStorage.getItem(STORAGE.FIRST_CAPTURE_SHOWN);
  if (shown) return;
  document.getElementById('firstCapturePopover').classList.add('show');
  setTimeout(dismissPopover, 6000);
}

function dismissPopover() {
  document.getElementById('firstCapturePopover').classList.remove('show');
  localStorage.setItem(STORAGE.FIRST_CAPTURE_SHOWN, 'true');
}

// ============ HELPERS ============
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ============ GO ============
render();
