<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Relationship Hub — TAPDconnex</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Manrope:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"><style>:root{--bg:#F6F2EA;--surface:#fff;--text:#181410;--muted:#5C5247;--soft:#EAE2D2;--medium:#D9CDB6;--accent:#1E4F5C;--act:#B8501E;--log:#5A7148;--low:#6B5F52;--font-display:Fraunces,Georgia,serif;--font-body:Manrope,sans-serif;--font-mono:'JetBrains Mono',monospace}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body)}.top{position:sticky;top:0;background:rgba(246,242,234,.94);border-bottom:1px solid var(--soft);padding:16px 24px;z-index:5}.top-inner{max-width:1180px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:12px;text-decoration:none}.mark{width:38px;height:38px;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;font-family:var(--font-display);font-weight:700}.brand-name{font-family:var(--font-display);font-size:25px;font-weight:700}.nav{display:flex;gap:8px;background:rgba(255,255,255,.65);border:1px solid var(--soft);border-radius:18px;padding:6px}.nav a{padding:13px 18px;border-radius:14px;text-decoration:none;font-weight:800}.nav .active{background:var(--accent);color:#fff}.wrap{max-width:920px;margin:auto;padding:32px 20px}.hero{background:#fff;border:1px solid var(--soft);border-radius:24px;padding:28px;margin-bottom:18px}.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#95887A;font-weight:700}.hero h1{font-family:var(--font-display);font-size:42px;line-height:1.05;margin:10px 0}.hero em{color:var(--accent)}.hero p{color:var(--muted);line-height:1.6}.filters{display:flex;gap:10px;overflow:auto;margin-bottom:18px}.chip{border:1px solid var(--soft);background:#fff;border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}.chip.active{background:var(--accent);color:#fff}.cards{display:grid;gap:14px}.card{background:#fff;border:1px solid var(--soft);border-radius:20px;padding:20px;border-left:5px solid var(--accent)}.card.low{border-left-color:var(--low);opacity:.88}.head{display:flex;justify-content:space-between;gap:12px}.name{font-family:var(--font-display);font-size:24px;font-weight:700}.sub,.meta,.signal{color:var(--muted)}.pill{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;background:#E8EFEF;color:var(--accent);border-radius:999px;padding:6px 10px}.action{font-family:var(--font-display);font-size:18px;margin:14px 0}.action:before{content:'→ ';color:var(--accent)}.actions{border-top:1px solid var(--soft);padding-top:14px;display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:800;cursor:pointer;text-decoration:none}.primary{background:var(--accent);color:white}.secondary{background:#fff;border:1px solid var(--medium)}.empty{text-align:center;background:#fff;border:1px solid var(--soft);border-radius:22px;padding:44px;color:var(--muted)}.empty h2{font-family:var(--font-display);color:var(--text);font-size:28px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#181410;color:#F6F2EA;border-radius:999px;padding:12px 18px;font-weight:800;display:none}@media(max-width:760px){.top-inner{display:block}.brand{margin-bottom:12px}.nav{overflow:auto}.head{display:block}}</style></head><body><header class="top"><div class="top-inner"><a class="brand" href="capture.html"><span class="mark">T</span><span class="brand-name">TAPDconnex</span></a><nav class="nav"><a href="capture.html">● Capture</a><a href="templates.html">▤ Templates</a><a class="active" href="relationship-hub.html">♢ Relationship Hub</a><a href="onboarding.html?step=8">○ Profile</a><a href="landing.html">↗ Share</a></nav></div></header><main class="wrap"><section class="hero"><div class="eyebrow">Relationship Hub</div><h1>Here is what needs your <em>attention</em>.</h1><p>The Hub opens directly now. It will not ask the networking-goal question again in the main flow.</p></section><div class="filters"><button class="chip active" data-filter="main">Main priority</button><button class="chip" data-filter="low">Low Priority</button><button class="chip" data-filter="done">Done off-platform</button></div><section id="cards" class="cards"></section></main><div id="toast" class="toast"></div><script src="tapd-sync.js"></script><script>const KEY='tapd_captures';let filter='main';function read(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}function write(a){localStorage.setItem(KEY,JSON.stringify(a))}function e(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function say(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1600)}function state(c){if(c.outcome==='low_priority')return'low';if(c.outcome==='done_off_platform'||c.outcome==='moved_forward')return'done';if(c.outcome==='let_go'||c.outcome==='archived')return'done';return'main'}function render(){const all=read();const list=all.filter(c=>state(c)===filter);const box=document.getElementById('cards');if(!list.length){box.innerHTML='<div class="empty"><h2>Nothing here right now</h2><p>Saved captures will appear here.</p><p><a class="btn primary" href="capture.html">👥 Capture this moment</a></p></div>';return}box.innerHTML=list.map(c=>`<article class="card ${state(c)==='low'?'low':''}" data-id="${e(c.id)}"><div class="head"><div><div class="name">${e(c.name||'Name not captured')}</div><div class="sub">${e([c.company,c.role].filter(Boolean).join(' · '))}</div></div><span class="pill">${state(c)==='low'?'LOW PRIORITY':state(c)==='done'?'DONE':'ACT'}</span></div><div class="signal"><b>${e(c.signalLabel||c.templateName||'Relationship signal')}</b> · ${e(c.evidence||'Saved capture')}</div><div class="action">${e(c.action||'Review next step')}</div><div class="meta">${e(c.event||'No event set')} · ${c.capturedDaysAgo===0?'Captured today':'Captured '+(c.capturedDaysAgo||0)+' days ago'}</div><div class="actions"><button class="btn primary" data-a="draft" data-id="${e(c.id)}">Open Draft</button><button class="btn secondary" data-a="done" data-id="${e(c.id)}">Done off-platform</button><button class="btn secondary" data-a="low" data-id="${e(c.id)}">Move to Low Priority</button></div></article>`).join('');document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>act(b.dataset.id,b.dataset.a))}function act(id,a){const all=read();const c=all.find(x=>x.id===id);if(!c)return;if(a==='draft'){say('Draft ready in this card');return}if(a==='low'){c.outcome='low_priority';say('Moved to Low Priority')}if(a==='done'){c.outcome='done_off_platform';say('Removed from main priority view')}write(all);try{if(window.TapdSync)TapdSync.patchCapture(c.id,{outcome:c.outcome})}catch(x){}render()}document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;render()});render();</script></body></html>
