<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Set up your TAPDconnex profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F6F2EA;
    --bg-paper: #F2EDE2;
    --surface: #FFFFFF;
    --surface-warm: #FBF8F2;
    --text-primary: #181410;
    --text-secondary: #5C5247;
    --text-muted: #95887A;
    --text-faint: #C2B7A8;
    --border-soft: #EAE2D2;
    --border-medium: #D9CDB6;
    --accent: #1E4F5C;
    --accent-hover: #14404C;
    --accent-bg: #E8EFEF;
    --warm-accent: #B8501E;
    --pro: #7C2D3F;
    --pro-bg: #F5E8EC;
    --success: #2D6A4F;
    --success-bg: #DCEFE3;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 10% 0%, rgba(30, 79, 92, 0.03) 0%, transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(184, 80, 30, 0.02) 0%, transparent 40%);
    background-attachment: fixed;
  }

  /* ============ LAYOUT ============ */
  .shell {
    max-width: 680px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 24px 24px 120px;
    display: flex;
    flex-direction: column;
  }

  /* ============ HEADER & PROGRESS ============ */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
  }
  .brand-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.005em;
  }

  .step-counter {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .step-counter strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .progress {
    height: 3px;
    background: var(--border-soft);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 48px;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
    border-radius: 3px;
  }

  /* ============ STEP CONTENT ============ */
  .step-content {
    animation: stepEnter 0.4s ease-out;
  }

  @keyframes stepEnter {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .step-headline {
    font-family: var(--font-display);
    font-size: clamp(28px, 5vw, 36px);
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 16px;
  }
  .step-headline em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }

  .step-sub {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 40px;
  }

  /* ============ FORM ELEMENTS ============ */
  .field {
    margin-bottom: 24px;
  }

  .field-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .field-required {
    color: var(--warm-accent);
  }
  .field-hint {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text-muted);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  .input,
  .textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--text-primary);
    transition: all 0.15s ease;
  }
  .textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }
  .input:focus,
  .textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(30, 79, 92, 0.08);
  }

  /* ============ OPTION TILES ============ */
  .option-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    text-align: left;
    width: 100%;
  }
  .option:hover {
    border-color: var(--accent);
    background: var(--surface);
  }
  .option.selected {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }
  .option-text {
    flex: 1;
  }
  .option-text-strong {
    display: block;
    font-weight: 600;
  }
  .option-text-sub {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 400;
  }
  .option.selected .option-text-sub {
    color: var(--accent);
    opacity: 0.7;
  }
  .option-arrow {
    color: var(--text-faint);
    font-family: var(--font-display);
    font-size: 18px;
    transition: color 0.15s ease;
  }
  .option.selected .option-arrow {
    color: var(--accent);
  }

  /* multi-select pills */
  .pill-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .pill {
    background: var(--surface);
    border: 1px solid var(--border-medium);
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .pill:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }
  .pill.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ============ CHANNEL SELECTOR ============ */
  .channel-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .channel {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 16px 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .channel:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }
  .channel.selected {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ============ PHOTO UPLOAD ============ */
  .photo-upload {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px;
    background: var(--surface-warm);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .photo-preview {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--bg-paper);
    border: 2px solid var(--border-medium);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
  }
  .photo-upload-text {
    flex: 1;
  }
  .photo-upload-btn {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    background: none;
    border: none;
    text-decoration: underline;
    text-underline-offset: 3px;
    padding: 0;
  }
  .photo-upload-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ============ STYLE PREVIEW ============ */
  .style-preview {
    background: var(--surface-warm);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 20px;
    margin-top: 16px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .style-preview-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .style-preview-message {
    color: var(--text-primary);
  }

  /* ============ TEMPLATES ============ */
  .template-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  .template-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.15s ease;
    cursor: pointer;
    position: relative;
  }
  .template-card:hover {
    border-color: var(--border-medium);
    background: var(--surface);
  }
  .template-card.expanded {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 4px 16px rgba(24, 20, 16, 0.06);
  }
  .template-card.pro-locked {
    background: var(--surface-warm);
    cursor: not-allowed;
    opacity: 0.85;
  }
  .template-card.pro-locked:hover {
    border-color: var(--pro);
  }

  .template-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }

  .template-info {
    flex: 1;
  }

  .template-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.005em;
  }
  .template-card.pro-locked .template-name {
    color: var(--text-secondary);
  }

  .template-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .template-pro-badge {
    background: var(--pro-bg);
    color: var(--pro);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 5px 9px;
    border-radius: 5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .template-body {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border-soft);
    display: none;
  }
  .template-card.expanded .template-body {
    display: block;
  }

  .template-section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .template-section-label:first-child {
    margin-top: 0;
  }

  .template-cheat-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    list-style: none;
  }
  .template-cheat-list li {
    font-size: 14px;
    color: var(--text-secondary);
    padding-left: 18px;
    position: relative;
    line-height: 1.5;
  }
  .template-cheat-list li::before {
    content: '\2192';
    color: var(--accent);
    position: absolute;
    left: 0;
    font-weight: 600;
  }

  .template-fields {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .template-field {
    background: var(--accent-bg);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
  }

  /* ============ TRUST INTRO ============ */
  .trust-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin: 32px 0 40px;
  }

  .trust-point {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    gap: 18px;
    align-items: flex-start;
  }

  .trust-icon {
    width: 32px;
    height: 32px;
    background: var(--accent-bg);
    color: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
  }

  .trust-text {
    flex: 1;
  }
  .trust-text-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.005em;
  }
  .trust-text-body {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.55;
  }

  /* ============ FINAL CARD-LIVE ============ */
  .live-celebration {
    text-align: center;
    padding: 40px 0;
  }

  .live-mark {
    width: 72px;
    height: 72px;
    background: var(--success-bg);
    color: var(--success);
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
  }

  .profile-link-box {
    background: var(--surface);
    border: 2px dashed var(--border-medium);
    border-radius: 12px;
    padding: 20px;
    margin: 32px 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .profile-link-info {
    flex: 1;
    text-align: left;
  }
  .profile-link-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .profile-link-url {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    word-break: break-all;
  }
  .copy-btn {
    background: var(--text-primary);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }
  .copy-btn:hover { background: var(--accent); }

  .nfc-steps {
    background: var(--surface-warm);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 20px;
    text-align: left;
    margin-top: 24px;
  }
  .nfc-step {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .nfc-step:last-child { border-bottom: none; }
  .nfc-step-num {
    width: 24px;
    height: 24px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .nfc-step-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* ============ NAV BUTTONS ============ */
  .actions {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border-soft);
    padding: 16px 24px;
    z-index: 50;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .actions-inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    border: none;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    padding: 14px 24px;
    border-radius: 12px;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    flex: 1;
    min-height: 52px;
  }
  .btn-primary:hover {
    background: var(--accent-hover);
  }
  .btn-primary:disabled {
    background: var(--border-medium);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  .btn-back {
    background: transparent;
    color: var(--text-secondary);
    padding: 14px 18px;
    border: 1px solid var(--border-medium);
    min-height: 52px;
  }
  .btn-back:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  .skip-link {
    color: var(--text-muted);
    background: none;
    border: none;
    font-family: var(--font-body);
    font-size: 13px;
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
    margin-top: 16px;
    display: block;
    text-align: center;
    width: 100%;
  }
  .skip-link:hover { color: var(--text-secondary); }

  /* ============ MOBILE ============ */
  @media (max-width: 600px) {
    .shell { padding: 16px 16px 110px; }
    .top { margin-bottom: 28px; }
    .progress { margin-bottom: 36px; }
    .step-headline { font-size: 26px; }
    .step-sub { font-size: 15px; }
    .channel-grid { grid-template-columns: repeat(2, 1fr); }
    .photo-upload { flex-direction: column; text-align: center; }
    .photo-upload-text { text-align: center; }
    .actions { padding: 12px 16px; }
    .actions-inner { gap: 8px; }
    .btn-primary { padding: 12px 16px; min-height: 48px; font-size: 14px; }
    .btn-back { padding: 12px 14px; min-height: 48px; font-size: 14px; }
    .profile-link-box { flex-direction: column; align-items: stretch; }
    .profile-link-info { text-align: center; }
  }
</style>
</head>
<body>
<script src="tapd-sync.js"></script>

<div class="shell">

  <!-- ============ HEADER ============ -->
  <header class="top">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div class="brand-name">TAPDconnex</div>
    </div>
    <div class="step-counter">
      <strong id="percentComplete">0%</strong> complete
    </div>
  </header>

  <div class="progress">
    <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
  </div>

  <!-- ============ STEP CONTAINER ============ -->
  <div id="stepContainer" class="step-content"></div>

</div>

<!-- ============ ACTION BAR ============ -->
<div class="actions">
  <div class="actions-inner">
    <button class="btn btn-back" id="backBtn" style="display: none;">&larr; Back</button>
    <button class="btn btn-primary" id="nextBtn">Continue &rarr;</button>
  </div>
</div>

<script>
// ============ STATE ============
const STORAGE_KEY = 'tapd_onboarding_data';

let state = {
  currentStep: 0,
  data: {
    intentPrimary: null,
    intentSecondary: [],
    networkingPrimary: null,
    networkingSecondary: null,
    photo: null,
    firstName: '',
    surname: '',
    name: '',
    role: '',
    company: '',
    intro: '',
    whatYouDo: '',
    canYouRelate: ['', '', '', '', ''],
    painPoints: ['', '', ''],
    waysToWork: [''],
    topFocus: '',
    preferredChannel: null,
    whatsapp: '',
    email: '',
    linkedin: '',
    instagram: '',
    website: '',
    greeting: 'Hi [First name],',
    opening: 'Great to meet at [Where we met] earlier today.',
    conversationRef: 'I really enjoyed our conversation about [What we discussed].',
    nextStepStyle: '[Next step]',
    signOff: 'Kind regards,\n[My name]',
    voiceAvoid: '',
    voiceEmphasise: '',
    voiceIntro: '',
    username: '',
    plan: 'starter',
    selectedTemplate: 'opportunity'
  }
};

// Load saved data if present
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  try {
    const parsed = JSON.parse(saved);
    state.data = { ...state.data, ...(parsed.data || {}) };
    state.currentStep = parsed.currentStep || 0;

    // Backward compatibility with earlier single-name/pain-point version
    if ((!state.data.firstName && !state.data.surname) && state.data.name) {
      const parts = String(state.data.name).trim().split(/\s+/);
      state.data.firstName = parts.shift() || '';
      state.data.surname = parts.join(' ');
    }
    if ((!state.data.canYouRelate || !state.data.canYouRelate.some(Boolean)) && state.data.painPoints) {
      state.data.canYouRelate = [
        state.data.painPoints[0] || '',
        state.data.painPoints[1] || '',
        state.data.painPoints[2] || '',
        '',
        ''
      ];
    }
    if (!state.data.networkingPrimary && state.data.intentPrimary) state.data.networkingPrimary = state.data.intentPrimary;
    if (!state.data.networkingSecondary && Array.isArray(state.data.intentSecondary) && state.data.intentSecondary.length) {
      state.data.networkingSecondary = state.data.intentSecondary[0];
    }
  } catch(e) {}
}

function syncName() {
  state.data.name = [state.data.firstName, state.data.surname].filter(Boolean).join(' ').trim();
}

const PROFILE_BASE_URL = 'https://tapdconnex-platform.vercel.app';

function getProfileSlug() {
  const fallbackName = state.data.name || [state.data.firstName, state.data.surname].filter(Boolean).join(' ') || 'yourname';
  return (state.data.username || fallbackName)
    .toLowerCase()
    .replace(/[^a-z0-9-]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'yourname';
}

function getProfileUrl(slug = getProfileSlug()) {
  return `${PROFILE_BASE_URL}/?profile=${encodeURIComponent(slug)}&nfc=1`;
}

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  const temp = document.createElement('textarea');
  temp.value = text;
  temp.setAttribute('readonly', '');
  temp.style.position = 'absolute';
  temp.style.left = '-9999px';
  document.body.appendChild(temp);
  temp.select();
  document.execCommand('copy');
  document.body.removeChild(temp);
  return Promise.resolve();
}

function save() {
  syncName();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  localStorage.setItem('tapd_user_plan', state.data.plan || 'starter');
  try { if (window.TapdSync) TapdSync.pushProfile(state.data, state.data.plan); } catch (e) {}
}

// ============ RENDER ============

// Deep-link + entry routing.
//   ?step=N    -> jump to that step
//   ?mode=edit -> open the existing profile to edit (no reset; starts at identity)
//   already complete + no params -> a finished user should not be forced back
//   through onboarding, so route them to the app.
const _obParams = new URLSearchParams(location.search);
const EDIT_MODE = _obParams.get('mode') === 'edit';
(function applyEntryRouting() {
  const stepN = parseInt(_obParams.get('step'), 10);
  const hasStep = Number.isFinite(stepN) && stepN >= 0 && stepN <= TOTAL_STEPS - 1;
  const isComplete = localStorage.getItem('tapd_onboarding_complete') === 'true';
  if (isComplete && !EDIT_MODE && !hasStep) {
    location.replace('capture.html');
    return;
  }
  if (hasStep) {
    state.currentStep = stepN;
  } else if (EDIT_MODE) {
    state.currentStep = 1; // identity — review/update from the top of the profile
  }
})();

function calculateCompletionPercent() {
  const d = state.data;
  const groups = [
    !!(d.firstName && d.surname && d.role && d.company && d.intro),              // 15
    !!d.networkingPrimary,                                                       // 30
    !!d.whatYouDo,                                                               // 45
    !!(d.canYouRelate || []).some(v => String(v || '').trim().length > 0),        // 60
    !!(d.waysToWork && d.waysToWork[0]),                                         // 75
    !!d.topFocus,                                                                // 85
    !!(d.preferredChannel && (d.whatsapp || d.email || d.linkedin || d.instagram || d.website)), // 95
    !!(d.greeting && d.opening && d.conversationRef && d.nextStepStyle && d.signOff) // 100
  ];
  const checkpoints = [15, 30, 45, 60, 75, 85, 95, 100];
  let pct = 0;
  groups.forEach((done, idx) => { if (done) pct = Math.max(pct, checkpoints[idx]); });
  return pct;
}

function render() {
  const percent = calculateCompletionPercent();
  const percentEl = document.getElementById('percentComplete');
  if (percentEl) percentEl.textContent = `${percent}%`;
  document.getElementById('progressBar').style.width = `${percent}%`;

  const container = document.getElementById('stepContainer');
  container.innerHTML = renderStep(state.currentStep);
  container.style.animation = 'none';
  container.offsetHeight;
  container.style.animation = 'stepEnter 0.4s ease-out';

  document.getElementById('backBtn').style.display = state.currentStep > 0 ? 'inline-flex' : 'none';

  const nextBtn = document.getElementById('nextBtn');
  if (state.currentStep === 0) {
    nextBtn.textContent = 'Got it — let’s set up →';
  } else if (state.currentStep === TOTAL_STEPS - 1) {
    nextBtn.textContent = 'Open my Hub →';
  } else {
    nextBtn.textContent = 'Continue →';
  }

  bindStepEvents();
  validateStep();
  save();
}

function renderStep(step) {
  switch(step) {
    case 0: return renderTrustStep();
    case 1: return renderIdentityStep();
    case 2: return renderNetworkingFocusStep();
    case 3: return renderWhatDoYouDoStep();
    case 4: return renderCanYouRelateStep();
    case 5: return renderWaysAndFocusStep();
    case 6: return renderReachStep();
    case 7: return renderMessageStyleStep();
    case 8: return renderNFCStep();
    case 9: return renderTemplatesStep();
    case 10: return renderCardLiveStep();
    default: return '';
  }
}

// ============ EVENTS ============
function bindStepEvents() {
  const step = state.currentStep;

  if (step === 0) {
    const pt = document.getElementById('planToggle');
    if (pt) pt.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-plan]');
      if (!btn) return;
      state.data.plan = btn.dataset.plan;
      save();
      render();
    });
  }

  if (step === 1) {
    const uploadBtn = document.getElementById('photoUploadBtn');
    if (uploadBtn) uploadBtn.addEventListener('click', () => document.getElementById('photoInput').click());

    const photoInput = document.getElementById('photoInput');
    if (photoInput) photoInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        state.data.photo = ev.target.result;
        const preview = document.getElementById('photoPreview');
        preview.style.backgroundImage = `url(${ev.target.result})`;
        preview.textContent = '';
        save();
      };
      reader.readAsDataURL(file);
    });

    ['firstName', 'surname', 'role', 'company', 'intro'].forEach(field => {
      const el = document.getElementById(field);
      if (el) el.addEventListener('input', () => {
        state.data[field] = el.value;
        syncName();
        validateStep();
        updateProgressOnly();
        save();
      });
    });
  }

  if (step === 2) {
    document.querySelectorAll('[data-primary-focus]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.data.networkingPrimary = btn.dataset.primaryFocus;
        state.data.intentPrimary = btn.dataset.primaryFocus;
        document.querySelectorAll('[data-primary-focus]').forEach(o => o.classList.remove('selected'));
        btn.classList.add('selected');
        validateStep();
        updateProgressOnly();
        save();
      });
    });
    document.querySelectorAll('[data-secondary-focus]').forEach(btn => {
      btn.addEventListener('click', () => {
        const selected = btn.dataset.secondaryFocus;
        state.data.networkingSecondary = state.data.networkingSecondary === selected ? null : selected;
        state.data.intentSecondary = state.data.networkingSecondary ? [state.data.networkingSecondary] : [];
        document.querySelectorAll('[data-secondary-focus]').forEach(o => o.classList.remove('selected'));
        if (state.data.networkingSecondary) btn.classList.add('selected');
        updateProgressOnly();
        save();
      });
    });
  }

  if (step === 3) {
    const el = document.getElementById('whatYouDo');
    if (el) el.addEventListener('input', (e) => {
      state.data.whatYouDo = e.target.value;
      validateStep();
      updateProgressOnly();
      save();
    });
  }

  if (step === 4) {
    document.querySelectorAll('.relate-input').forEach(input => {
      input.addEventListener('input', (e) => {
        const idx = Number(e.target.dataset.idx);
        state.data.canYouRelate[idx] = e.target.value;
        state.data.painPoints = state.data.canYouRelate.slice(0, 3);
        validateStep();
        updateProgressOnly();
        save();
      });
    });
  }

  if (step === 5) {
    document.querySelectorAll('.ways-input').forEach(input => {
      input.addEventListener('input', (e) => {
        const idx = Number(e.target.dataset.idx);
        if (!Array.isArray(state.data.waysToWork)) state.data.waysToWork = ['', '', ''];
        state.data.waysToWork[idx] = e.target.value;
        validateStep();
        updateProgressOnly();
        save();
      });
    });
    const topFocus = document.getElementById('topFocus');
    if (topFocus) topFocus.addEventListener('input', (e) => {
      state.data.topFocus = e.target.value;
      validateStep();
      updateProgressOnly();
      save();
    });
  }

  if (step === 6) {
    document.querySelectorAll('[data-channel]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.data.preferredChannel = btn.dataset.channel;
        document.querySelectorAll('[data-channel]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        validateStep();
        updateProgressOnly();
        save();
      });
    });
    ['whatsapp', 'email', 'linkedin', 'instagram', 'website'].forEach(field => {
      const el = document.getElementById(field);
      if (el) el.addEventListener('input', () => {
        state.data[field] = el.value;
        validateStep();
        updateProgressOnly();
        save();
      });
    });
  }

  if (step === 7) {
    document.querySelectorAll('.voice-input').forEach(input => {
      input.addEventListener('input', (e) => {
        state.data[e.target.dataset.field] = e.target.value;
        renderVoicePreview();
        validateStep();
        updateProgressOnly();
        save();
      });
    });
    const voiceIntro = document.getElementById('voiceIntro');
    if (voiceIntro) voiceIntro.addEventListener('input', (e) => {
      state.data.voiceIntro = e.target.value;
      save();
    });
    renderVoicePreview();
  }

  if (step === 8) {
    document.getElementById('username').addEventListener('input', (e) => {
      const clean = e.target.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
      e.target.value = clean;
      state.data.username = clean;
      document.getElementById('urlPreview').textContent = getProfileUrl(clean || 'yourname');
      save();
    });
    document.getElementById('copyUrlBtn').addEventListener('click', () => {
      const url = getProfileUrl();
      copyText(url);
      document.getElementById('copyUrlBtn').textContent = 'Copied';
      setTimeout(() => { document.getElementById('copyUrlBtn').textContent = 'Copy'; }, 1500);
    });
  }

  if (step === 9) {
    document.querySelectorAll('.template-card').forEach(card => {
      card.addEventListener('click', () => {
        const isLocked = card.dataset.locked === 'true';
        document.querySelectorAll('.template-card').forEach(c => {
          if (c !== card) c.classList.remove('expanded');
        });
        card.classList.toggle('expanded');
        if (!isLocked) {
          state.data.selectedTemplate = card.dataset.template;
          save();
        }
      });
    });
  }

  if (step === 10) {
    const copyBtn = document.getElementById('copyFinalBtn');
    if (copyBtn) {
      copyBtn.addEventListener('click', () => {
        copyText(getProfileUrl());
        copyBtn.textContent = 'Copied';
        setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
      });
    }
    const visitorBtn = document.getElementById('viewAsVisitor');
    if (visitorBtn) {
      visitorBtn.addEventListener('click', () => {
        window.open(getProfileUrl(), '_blank', 'noopener');
      });
    }
  }
}

function updateProgressOnly() {
  const percent = calculateCompletionPercent();
  const bar = document.getElementById('progressBar');
  if (bar) bar.style.width = `${percent}%`;
  const percentEl = document.getElementById('percentComplete');
  if (percentEl) percentEl.textContent = `${percent}%`;
}

function renderVoicePreview() {
  const sample = {
    '[First name]': state.data.firstName || 'Sarah',
    '[Where we met]': 'the SaaS Summit',
    '[What we discussed]': 'how AI is reshaping early-stage operations',
    '[Next step]': 'I’ll send the deck on Monday and we can lock in a 30-min call.',
    '[My name]': state.data.name || 'You'
  };

  const fill = (text) => {
    let out = text || '';
    Object.keys(sample).forEach(k => { out = out.replaceAll(k, sample[k]); });
    return out;
  };

  const msg = [
    fill(state.data.greeting),
    '',
    fill(state.data.opening),
    fill(state.data.conversationRef),
    '',
    fill(state.data.nextStepStyle),
    '',
    fill(state.data.signOff)
  ].join('\n');

  const previewEl = document.getElementById('voicePreview');
  if (previewEl) previewEl.textContent = msg;
}

// ============ VALIDATION ============
function validateStep() {
  const step = state.currentStep;
  let valid = true;

  if (step === 1) {
    valid = !!(state.data.firstName && state.data.surname && state.data.role && state.data.company && state.data.intro);
  } else if (step === 2) {
    valid = !!state.data.networkingPrimary;
  } else if (step === 3) {
    valid = !!state.data.whatYouDo;
  } else if (step === 4) {
    valid = !!(state.data.canYouRelate || []).some(p => String(p || '').trim().length > 0);
  } else if (step === 5) {
    valid = !!(state.data.waysToWork && state.data.waysToWork.some(w => String(w || '').trim().length > 0) && state.data.topFocus);
  } else if (step === 6) {
    const ch = state.data.preferredChannel;
    const fieldFor = { whatsapp: 'whatsapp', email: 'email', linkedin: 'linkedin' };
    valid = !!(ch && fieldFor[ch] && state.data[fieldFor[ch]]);
  } else if (step === 7) {
    valid = !!(state.data.greeting && state.data.opening && state.data.conversationRef && state.data.nextStepStyle && state.data.signOff);
  }

  document.getElementById('nextBtn').disabled = !valid;
}

function markOnboardingComplete() {
  state.currentStep = TOTAL_STEPS - 1;
  save();
  // Broad compatibility flags so the Hub/landing page does not show the one-time focus prompt again.
  localStorage.setItem('tapd_onboarding_complete', 'true');
  localStorage.setItem('tapd_onboarding_completed_at', new Date().toISOString());
  localStorage.setItem('tapd_profile_complete', 'true');
  localStorage.setItem('tapd_owner_profile_complete', 'true');
  localStorage.setItem('tapd_show_focus_prompt', 'false');
  localStorage.setItem('tapd_focus_prompt_seen', 'true');
  localStorage.setItem('tapd_waitlist_reserved', 'true');
}

// ============ NAVIGATION ============
document.getElementById('nextBtn').addEventListener('click', () => {
  if (state.currentStep < TOTAL_STEPS - 1) {
    state.currentStep++;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  } else {
    markOnboardingComplete();
    window.location.href = 'index.html';
  }
});

document.getElementById('backBtn').addEventListener('click', () => {
  if (state.currentStep > 0) {
    state.currentStep--;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  }
});

// ============ HELPERS ============
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// ============ GO ============
render();
</script>
