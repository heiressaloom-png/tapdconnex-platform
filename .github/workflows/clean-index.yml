name: Commit cleaned TAPD index

on:
  workflow_dispatch:
  push:
    paths:
      - 'build-stabilise-navigation.js'
      - 'build-inject-update-68.js'

permissions:
  contents: write

jobs:
  clean-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate cleaned index
        run: node build-inject-update-68.js

      - name: Commit cleaned index if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet index.html; then
            echo "index.html already clean"
          else
            git add index.html
            git commit -m "Commit cleaned generated index"
            git push
          fi
