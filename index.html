<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TAPDconnex</title>
<meta name="description" content="TAPDconnex — capture conversations and turn them into meaningful follow-up.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F2EA;--surface:#fff;--text:#181410;--muted:#5C5247;--soft:#EAE2D2;--medium:#D9CDB6;--accent:#1E4F5C;--accent-hover:#14404C;--gold:#D8A637;--gold-deep:#9E7320;--font-display:'Fraunces',Georgia,serif;--font-body:'Manrope',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:18px;--shadow:0 18px 60px rgba(24,20,16,.08)}
*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased}body{background-image:radial-gradient(circle at 12% 0%,rgba(30,79,92,.05),transparent 36%),radial-gradient(circle at 85% 100%,rgba(216,166,55,.08),transparent 38%)}
.shell{max-width:1180px;margin:0 auto;min-height:100vh;padding:28px 24px 40px}.top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:34px}.brand{display:flex;align-items:center;gap:12px}.mark{width:38px;height:38px;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;font-family:var(--font-display);font-weight:700}.brand-name{font-family:var(--font-display);font-size:24px;font-weight:600}.chip{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--medium);border-radius:999px;padding:8px 12px;color:var(--muted)}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:stretch}.panel{background:rgba(255,255,255,.76);border:1px solid var(--soft);border-radius:24px;box-shadow:var(--shadow);padding:32px}.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}.headline{font-family:var(--font-display);font-size:clamp(34px,5vw,62px);line-height:1.05;font-weight:500;letter-spacing:-.03em}.headline em{font-style:italic;color:var(--accent)}.sub{font-size:18px;color:var(--muted);line-height:1.6;margin-top:20px;max-width:54ch}.actions{display:grid;gap:12px;margin-top:28px}.btn{border:1px solid var(--medium);background:#fff;color:var(--text);border-radius:16px;padding:18px 20px;text-decoration:none;font-weight:800;display:flex;align-items:center;justify-content:space-between;gap:14px;transition:.18s ease}.btn:hover{transform:translateY(-1px);border-color:var(--accent);box-shadow:0 10px 28px rgba(24,20,16,.08)}.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn.primary:hover{background:var(--accent-hover)}
.capture-preview{display:grid;place-items:center;min-height:480px;position:relative;overflow:hidden}.gold-button{width:240px;height:240px;border-radius:50%;border:1px solid rgba(158,115,32,.65);background:radial-gradient(circle at 35% 24%,#FFE796,#E9B63D 58%,#B97C17);box-shadow:inset 0 4px 16px rgba(255,255,255,.45),inset 0 -10px 18px rgba(105,67,10,.25),0 22px 80px rgba(216,166,55,.32);display:grid;place-items:center;text-align:center;font-family:var(--font-display);font-size:30px;font-weight:700;line-height:1.1;position:relative;animation:breathe 3.2s ease-in-out infinite}.gold-button:before,.gold-button:after{content:'';position:absolute;border-radius:50%;inset:-18px;border:1px solid rgba(216,166,55,.38);animation:ripple 3.2s ease-out infinite}.gold-button:after{inset:-38px;animation-delay:.7s}.wave{position:absolute;left:8%;right:8%;height:80px;opacity:.32;background:repeating-radial-gradient(ellipse at center,rgba(216,166,55,.55) 0 2px,transparent 3px 12px);filter:blur(.2px);animation:wave 2.8s ease-in-out infinite}@keyframes breathe{50%{transform:scale(1.035);box-shadow:inset 0 4px 16px rgba(255,255,255,.55),inset 0 -10px 18px rgba(105,67,10,.22),0 24px 92px rgba(216,166,55,.46)}}@keyframes ripple{0%{transform:scale(.94);opacity:.55}75%{transform:scale(1.16);opacity:0}100%{opacity:0}}@keyframes wave{50%{transform:scaleX(1.08);opacity:.48}}
.foot{margin-top:24px;display:flex;gap:18px;flex-wrap:wrap}.foot a{color:var(--muted);font-size:13px;text-decoration:none}.foot a:hover{color:var(--text)}@media(max-width:820px){.hero{grid-template-columns:1fr}.capture-preview{min-height:380px}.gold-button{width:190px;height:190px;font-size:25px}.top{align-items:flex-start}.brand-name{font-size:20px}}
</style>
</head>
<body>
<script>
const ob=(()=>{try{return JSON.parse(localStorage.getItem('tapd_onboarding_data'))}catch(e){return null}})();
const onboarded=!!(ob&&ob.data&&(ob.data.name||ob.data.firstName));
if(onboarded){ location.replace('capture.html'); }
</script>
<div class="shell">
<header class="top"><div class="brand"><div class="mark">T</div><div class="brand-name">TAPDconnex</div></div><div class="chip">Starter preview</div></header>
<main class="hero">
<section class="panel"><div class="eyebrow">Welcome</div><h1 class="headline">Turn conversations into <em>follow-up</em>.</h1><p class="sub">Set up your profile once, add it to your NFC tag, then capture the conversations worth remembering.</p><div class="actions"><a class="btn primary" href="onboarding.html">Set up your profile & voice <span>→</span></a><a class="btn" href="landing.html">See how TAPDconnex works <span>→</span></a></div></section>
<section class="panel capture-preview"><div class="wave"></div><div class="gold-button">Capture<br>This Moment</div></section>
</main><nav class="foot"><a href="privacy-policy.html">Privacy</a><a href="terms-of-use.html">Terms</a><a href="responsible-recording.html">Responsible recording</a><a href="contact.html">Contact</a></nav>
</div>
</body></html>
