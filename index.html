<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="TAPDconnex — turn real-world conversations into relationships you actually follow up on.">
<title>TAPDconnex</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ============ DESIGN SYSTEM (matches all pages) ============ */
  :root {
    --bg: #F6F2EA;
    --bg-paper: #F2EDE2;
    --surface: #FFFFFF;
    --surface-warm: #FBF8F2;
    --text-primary: #181410;
    --text-secondary: #5C5247;
    --text-muted: #95887A;
    --text-faint: #C2B7A8;
    --border-soft: #EAE2D2;
    --border-medium: #D9CDB6;
    --accent: #1E4F5C;
    --accent-hover: #14404C;
    --accent-bg: #E8EFEF;
    --warm-accent: #B8501E;
    --warm-bg: #FBEDD9;
    --pro: #7C2D3F;
    --pro-bg: #F5E8EC;
    --success: #2D6A4F;
    --success-bg: #DCEFE3;
    --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
    --space-5: 20px; --space-6: 24px; --space-7: 32px; --space-8: 40px; --space-9: 56px;
    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
    --radius-xl: 20px; --radius-pill: 999px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --shadow-sm: 0 1px 2px rgba(24, 20, 16, 0.04);
    --shadow-md: 0 2px 8px rgba(24, 20, 16, 0.06);
    --shadow-lg: 0 8px 24px rgba(24, 20, 16, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .shell { max-width: 680px; margin: 0 auto; min-height: 100vh; padding: 0 0 var(--space-8); }

  /* Header */
  .top {
    padding: var(--space-5) var(--space-5) var(--space-4);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-soft);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: white; font-family: var(--font-display); font-size: 15px; font-weight: 600;
  }
  .brand-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; letter-spacing: -0.005em; }
  .plan-chip {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 600; padding: 5px 10px; border-radius: var(--radius-pill);
    color: var(--accent); background: var(--accent-bg);
  }
  .plan-chip.pro { color: var(--pro); background: var(--pro-bg); }

  /* Hero */
  .hero { padding: var(--space-8) var(--space-5) var(--space-6); }
  .eyebrow {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 14px;
  }
  .headline {
    font-family: var(--font-display); font-size: clamp(30px, 6vw, 40px);
    font-weight: 500; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 14px;
  }
  .headline em { font-style: italic; color: var(--accent); font-weight: 400; }
  .sub { font-size: 16px; color: var(--text-secondary); line-height: 1.6; max-width: 52ch; }

  /* Action cards */
  .actions { padding: 0 var(--space-5); display: flex; flex-direction: column; gap: 12px; }
  .section-title {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-muted); margin: var(--space-6) 0 var(--space-2);
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-soft); }

  .card {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg); padding: 18px var(--space-5);
    cursor: pointer; transition: all 0.18s ease; text-align: left; width: 100%;
    font-family: var(--font-body); text-decoration: none; color: inherit;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .card-icon {
    width: 44px; height: 44px; flex-shrink: 0; border-radius: var(--radius-md);
    background: var(--accent-bg); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 20px; font-weight: 600;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: -0.005em; }
  .card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.45; margin-top: 2px; }
  .card-arrow { color: var(--text-faint); font-size: 20px; flex-shrink: 0; }
  .card:hover .card-arrow { color: var(--accent); }

  .card.primary { background: var(--accent); border-color: var(--accent); }
  .card.primary .card-title, .card.primary .card-desc, .card.primary .card-arrow { color: #fff; }
  .card.primary .card-desc { color: rgba(255,255,255,0.82); }
  .card.primary .card-icon { background: rgba(255,255,255,0.16); color: #fff; }
  .card.primary:hover { background: var(--accent-hover); }

  .count-pill {
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    background: var(--success-bg); color: var(--success);
    padding: 3px 9px; border-radius: var(--radius-pill); margin-left: 8px;
  }

  .footer-links {
    margin-top: var(--space-7); padding: 0 var(--space-5);
    display: flex; gap: 18px; flex-wrap: wrap;
  }
  .footer-links a {
    font-size: 13px; color: var(--text-muted); text-decoration: none;
    border-bottom: 1px solid transparent; transition: all 0.15s ease;
  }
  .footer-links a:hover { color: var(--text-primary); border-bottom-color: var(--text-muted); }

  @media (max-width: 480px) {
    .top { padding: var(--space-4); }
    .hero { padding: var(--space-7) var(--space-4) var(--space-5); }
    .actions, .footer-links { padding-left: var(--space-4); padding-right: var(--space-4); }
  }
</style>
</head>
<body>

<div class="shell">
  <header class="top">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div class="brand-name">TAPDconnex</div>
    </div>
    <span class="plan-chip" id="planChip">Starter</span>
  </header>

  <section class="hero">
    <div class="eyebrow" id="heroEyebrow">Welcome</div>
    <h1 class="headline" id="heroHeadline">Turn conversations into <em>relationships</em>.</h1>
    <p class="sub" id="heroSub">Tap a card, capture the conversation, and TAPD writes the follow-up in your voice. Let&rsquo;s get you set up.</p>
  </section>

  <div class="actions" id="actions"></div>

  <nav class="footer-links">
    <a href="landing.html">How it works</a>
    <a href="onboarding.html">Profile &amp; voice</a>
    <a href="privacy-policy.html">Privacy</a>
    <a href="terms-of-use.html">Terms</a>
  </nav>
</div>

<script>
// ============ TAPDconnex — App Home / Router ============
const STORAGE = {
  ONBOARDING: 'tapd_onboarding_data',
  PLAN: 'tapd_user_plan',
  CAPTURES: 'tapd_captures'
};

function readJSON(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch (e) { return fallback; }
}

function getState() {
  const ob = readJSON(STORAGE.ONBOARDING, null);
  const data = ob && ob.data ? ob.data : null;
  const onboarded = !!(data && data.name);
  const plan = localStorage.getItem(STORAGE.PLAN) || (data && data.plan) || 'starter';
  const captures = readJSON(STORAGE.CAPTURES, []);
  const activeCount = Array.isArray(captures) ? captures.filter(c => c.outcome === 'active').length : 0;
  const needsName = Array.isArray(captures) ? captures.filter(c => c.outcome === 'active' && c.needsNameConfirmation).length : 0;
  return { onboarded, name: data && data.name, plan, activeCount, needsName };
}

function card({ href, icon, title, desc, primary, extra }) {
  return `
    <a class="card ${primary ? 'primary' : ''}" href="${href}">
      <div class="card-icon">${icon}</div>
      <div class="card-body">
        <div class="card-title">${title}${extra || ''}</div>
        <div class="card-desc">${desc}</div>
      </div>
      <div class="card-arrow">&rarr;</div>
    </a>
  `;
}

function render() {
  const s = getState();

  // Plan chip
  const chip = document.getElementById('planChip');
  chip.textContent = s.plan === 'pro' ? 'Pro' : 'Starter';
  chip.classList.toggle('pro', s.plan === 'pro');

  const actions = document.getElementById('actions');

  if (!s.onboarded) {
    // First-time: point clearly at setup
    document.getElementById('heroEyebrow').textContent = 'Welcome';
    document.getElementById('heroHeadline').innerHTML = 'Turn conversations into <em>relationships</em>.';
    document.getElementById('heroSub').textContent = 'Tap a card, capture the conversation, and TAPD writes the follow-up in your voice. Let\u2019s get you set up.';
    actions.innerHTML = `
      <div class="section-title">Start here</div>
      ${card({ href: 'onboarding.html', icon: '1', title: 'Set up your profile & voice', desc: 'Two minutes. This is what makes every follow-up sound like you.', primary: true })}
      ${card({ href: 'landing.html', icon: '?', title: 'See how it works first', desc: 'A quick look at what TAPDconnex does before you set up.' })}
    `;
    return;
  }

  // Returning user
  const first = (s.name || '').split(' ')[0];
  document.getElementById('heroEyebrow').textContent = 'Your home';
  document.getElementById('heroHeadline').innerHTML = `Welcome back${first ? ', <em>' + escapeHtml(first) + '</em>' : ''}.`;
  document.getElementById('heroSub').textContent = 'Capture a new conversation, or pick up the relationships worth your attention.';

  const hubExtra = s.activeCount > 0 ? `<span class="count-pill">${s.activeCount} active</span>` : '';
  const nameWarn = s.needsName > 0
    ? `${s.needsName} ${s.needsName === 1 ? 'capture needs' : 'captures need'} a name \u00b7 `
    : '';

  actions.innerHTML = `
    ${card({ href: 'capture.html', icon: '\u25CF', title: 'New capture', desc: 'Tap, record the conversation, get a structured follow-up.', primary: true })}
    <div class="section-title">Pick up where you left off</div>
    ${card({ href: 'relationship-hub.html', icon: '\u25C8', title: 'Relationship Hub', desc: nameWarn + 'The people worth following up with.', extra: hubExtra })}
    ${card({ href: 'templates.html', icon: '\u25A4', title: 'Templates', desc: 'Tune what each conversation listens for.' })}
    ${card({ href: 'onboarding.html', icon: '\u25CB', title: 'Profile & voice', desc: 'Update your details, follow-up voice, and plan.' })}
  `;
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

render();
</script>
</body>
</html>
